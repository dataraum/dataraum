# Financial Reporting Ontology
# 
# This ontology provides context for financial data analysis.
# It includes concepts, metrics, and quality rules specific to
# financial reporting and analysis.

name: financial_reporting
version: "1.0.0"
description: |
  Financial analysis and reporting context. Suitable for income statements,
  balance sheets, cash flow analysis, and general financial metrics.

# Concepts are semantic categories that columns can be mapped to
concepts:
  - name: revenue
    description: Income from sales or services
    indicators:
      - revenue
      - sales
      - income
      - turnover
      - receipts
    exclude_patterns:
      - cost
      - expense
    typical_role: measure
    kind: measure
    unit_from_concept: currency
    
  - name: cost_of_goods_sold
    description: Direct costs attributable to goods sold
    indicators:
      - cogs
      - cost_of_goods
      - cost_of_sales
      - direct_cost
    typical_role: measure
    kind: measure
    
  - name: operating_expense
    description: Expenses from normal business operations
    indicators:
      - opex
      - operating_expense
      - operating_cost
      - sga
      - overhead
    typical_role: measure
    kind: measure
    
  - name: depreciation
    description: Allocation of asset cost over useful life
    indicators:
      - depreciation
      - depr
      - amortization
      - amort
    typical_role: measure
    kind: measure
    
  - name: interest
    description: Interest income or expense
    indicators:
      - interest
      - interest_expense
      - interest_income
      - finance_cost
    typical_role: measure
    kind: measure
    
  - name: tax
    description: Tax expense or benefit
    indicators:
      - tax
      - income_tax
      - tax_expense
      - tax_provision
    typical_role: measure
    kind: measure
    
  - name: fiscal_period
    kind: dimension
    description: Time period for financial reporting
    indicators:
      - period
      - fiscal_period
      - reporting_period
      - quarter
      - fiscal_year
      - fy
      - month
      - date
    typical_role: timestamp

  - name: entity
    kind: entity
    description: Business entity or cost center
    indicators:
      - entity
      - company
      - subsidiary
      - division
      - cost_center
      - department
      - business_unit
    typical_role: dimension
    
  - name: account
    kind: entity
    description: Chart of accounts entry
    indicators:
      - account
      - gl_account
      - account_code
      - account_number
      - coa
    typical_role: dimension
    
  - name: currency
    kind: unit
    description: Currency of monetary values
    indicators:
      - currency
      - ccy
      - curr
    typical_role: dimension
    is_unit_dimension: true
    typical_values:
      - USD
      - EUR
      - GBP
      - CHF
      - JPY

  # Balance Sheet Concepts
  - name: accounts_receivable
    description: Money owed to the company by customers
    indicators:
      - accounts_receivable
      - ar
      - a/r
      - receivables
      - trade_receivables
      - customer_balance
      - ar_paid
      - a/r_paid
    typical_role: measure
    kind: measure
    unit_from_concept: currency

  - name: accounts_payable
    description: Money owed by the company to suppliers
    indicators:
      - accounts_payable
      - ap
      - a/p
      - payables
      - trade_payables
      - vendor_balance
      - ap_paid
      - a/p_paid
    typical_role: measure
    kind: measure
    unit_from_concept: currency

  - name: inventory
    description: Goods held for sale or production
    indicators:
      - inventory
      - stock
      - goods_on_hand
      - wip
      - work_in_progress
      - finished_goods
    typical_role: measure
    kind: measure

  - name: current_assets
    description: Assets expected to be converted to cash within one year
    indicators:
      - current_assets
      - short_term_assets
      - liquid_assets
    typical_role: measure
    kind: measure

  - name: current_liabilities
    description: Obligations due within one year
    indicators:
      - current_liabilities
      - short_term_liabilities
      - current_debt
    typical_role: measure
    kind: measure

  - name: cash
    description: Cash and cash equivalents
    indicators:
      - cash
      - bank_balance
      - cash_balance
      - cash_equivalents
    typical_role: measure
    kind: measure
    unit_from_concept: currency

  - name: open_balance
    description: Outstanding balance on an account or transaction
    indicators:
      - open_balance
      - outstanding_balance
      - balance_due
      - remaining_balance
      - unpaid
    typical_role: measure
    kind: measure
    unit_from_concept: currency

  # Trial-balance / ledger period balances (DAT-405). Without this concept,
  # debit_balance/credit_balance keyword-match the `debit`/`credit` FLOW
  # concepts below and inherit `additive` — but a balance column is a
  # point-in-time stock per period. That mislabel made temporal_drift's
  # point-in-time gate inert on trial_balance (period-over-period distribution
  # shift is the data model there, not drift) and misgrounds query agents
  # (a periodic TB must not be summed across periods).
  - name: account_balance
    description: The debit/credit balance of a ledger account (trial balance, general ledger)
    indicators:
      - account_balance
      - debit_balance
      - credit_balance
      - opening_balance
      - closing_balance
      - ending_balance
      - beginning_balance
    typical_role: measure
    kind: measure
    unit_from_concept: currency

  - name: transaction_amount
    description: Monetary value of a transaction
    indicators:
      - amount
      - transaction_amount
      - total
      - value
      - price
    typical_role: measure
    kind: measure
    unit_from_concept: currency

  - name: debit
    description: Debit entry in double-entry accounting
    indicators:
      - debit
      - dr
    typical_role: measure
    kind: measure
    unit_from_concept: currency

  - name: credit
    description: Credit entry in double-entry accounting
    indicators:
      - credit
      - cr
    typical_role: measure
    kind: measure
    unit_from_concept: currency

  - name: equity
    description: Owner's equity or shareholders' equity
    indicators:
      - equity
      - shareholders_equity
      - stockholders_equity
      - owners_equity
      - capital
      - retained_earnings
      - net_assets
    typical_role: measure
    kind: measure
    unit_from_concept: currency

# Domain conventions, piped VERBATIM to any SQL-authoring agent (extraction +
# validation) — DAT-645. The engine parses only the generic envelope (id /
# targets / statement / concept_groups) and lints that group members are declared
# concepts; it never interprets "sign" or "credit_normal" — those are opaque
# labels the LLM reads. Single source of truth: validations/sign_conventions.yaml
# consumes this block instead of re-declaring its own account lists, so the
# extraction and validation paths can no longer disagree about sign.
conventions:
    # Scoped routing: ALL extraction (every measure needs a sign), the
    # sign_conventions VALIDATION (a sign rule is noise in unrelated checks like a
    # raw debit=credit trial-balance test), and the cockpit Q&A agent (qa) — which
    # composes new SQL for free-form questions and needs the same sign rule.
  - id: sign_natural_balance
    targets: [extraction, "validation:sign_conventions", qa]
    statement: >
      Express every monetary measure in its natural-balance direction so a healthy
      value reads POSITIVE. By account family: asset and expense accounts are
      DEBIT-normal (natural balance = SUM(debit) - SUM(credit)); liability, equity,
      revenue, and income accounts are CREDIT-normal (natural balance = SUM(credit) -
      SUM(debit)). Sign a measure by the normal balance of the accounts it is drawn
      from; the concept groups below list which measures are credit- vs debit-normal.
      Exclude contra accounts (names containing accumulated, allowance, contra,
      reserve) — they legitimately invert. A measure not listed has no fixed normal
      balance (raw ledger columns such as debit, credit, transaction_amount, or period
      balances) — sign it from its account context, not from this rule.
    concept_groups:
      credit_normal:
        - revenue
        - accounts_payable
        - current_liabilities
        - equity
      debit_normal:
        - cost_of_goods_sold
        - operating_expense
        - depreciation
        - tax
        - accounts_receivable
        - inventory
        - current_assets
        - cash

    # Ledger legs net one-sidedly all the time (an A/R account only ever debited,
    # an A/P account only ever credited) — the generic empty-aggregation rule
    # owns the row-guarded netting SHAPE; which legs net, and that a one-sided
    # account is normal ledger reality, is finance knowledge and lives here.
  - id: ledger_leg_netting
    targets: [extraction, qa]
    statement: >
      Ledger measures net two legs (debit and credit). A one-sided account — e.g.
      a receivables account only ever debited, a payables account only ever
      credited — has an entirely NULL opposite leg over its matched rows; that is
      normal ledger reality, not missing data. Net the legs with the row-guarded
      NULL-safe shape from the empty-aggregation rule, ordering the legs by the
      account family's natural balance (see sign_natural_balance).

    # Balance-sheet concepts are NOT single columns — they are account FAMILIES
    # drawn from the chart of accounts. account_type (asset/liability/…) is too
    # coarse (it mixes current and non-current), and the abstract concept
    # indicators (e.g. "current_assets", "liquid_assets") match no real account
    # name, so the extraction agent has nothing to latch onto and abstains or
    # coarse-guesses. This convention gives it the classification RULE to apply to
    # the served account_id__name value-set — a rule, not hardcoded names, so it
    # generalises across charts.
  - id: balance_sheet_composition
    targets: [extraction, qa]
    statement: >
      Balance-sheet concepts are NOT any single column — they are drawn from the
      chart of accounts by account family. Ground each by joining journal lines to
      the account dimension and selecting the matching account_id__name values from
      the served complete value-set — never a raw ledger column, and never a coarse
      account_type-only filter (account_type mixes current and non-current). By
      family: accounts_receivable = asset accounts recording money owed BY customers
      (trade and other receivable accounts); accounts_payable = liability accounts
      recording money owed TO suppliers (trade and other payable and accrued-expense
      accounts); current_assets = asset accounts convertible to cash within one year
      (cash and bank, receivables, inventory, prepaid expenses), EXCLUDING
      non-current assets (property, equipment, vehicles, furniture, fixed assets,
      accumulated depreciation); current_liabilities = liability accounts due within
      one year (payables, accrued expenses, taxes payable, short-term and current
      debt), EXCLUDING long-term debt. Select the specific account_id__name values
      that match a family from the complete value-set; if none match, ABSTAIN rather
      than approximate.
    concept_groups:
      current_asset_family:
        - current_assets
        - cash
        - accounts_receivable
        - inventory
      current_liability_family:
        - current_liabilities
        - accounts_payable
