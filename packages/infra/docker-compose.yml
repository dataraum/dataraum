# DataRaum platform stack — Postgres + Temporal + engine activity worker (Python) + cockpit (TanStack Start).
#
# This file BUILDS the engine + cockpit images from this checkout — it is the
# dev / CI / local-smoke face. To run the PUBLISHED release images instead (a
# deploy host, no build toolchain), overlay docker-compose.release.yml, which
# pins the app services to `image: ghcr.io/dataraum/...:$DATARAUM_VERSION`:
#   DATARAUM_VERSION=1.2.3 docker compose \
#     -f packages/infra/docker-compose.yml -f packages/infra/docker-compose.release.yml \
#     up -d --wait --no-build
#
# Run from workspace root:
#   docker compose -f packages/infra/docker-compose.yml --env-file packages/infra/.env up -d --wait
# Or via the root Makefile:
#   make up
#
# First run:
#   cp packages/infra/.env.example packages/infra/.env
#   make up
#   # engine health = Temporal worker heartbeat (no HTTP endpoint):
#   docker compose run --rm --no-deps --entrypoint temporal temporal-admin-tools \
#     worker list --namespace default --address temporal:7233   # → Status: Running
#   open http://127.0.0.1:3000
#
# Egress posture: both app images pre-bake their DuckDB extensions
# (DUCKLAKE_SKIP_INSTALL=1 in engine + cockpit Dockerfiles), so nothing here
# touches extensions.duckdb.org at runtime. The remaining runtime egress is
# (1) api.anthropic.com — HTTPS from engine (httpx) and cockpit (Bun fetch),
# both of which honor standard HTTPS_PROXY/NO_PROXY env, injectable via a
# compose override — and (2) raw TCP to user-configured source DBs
# (connect/probe), which no HTTP proxy can carry. That asymmetry is why this
# stack deliberately bundles NO egress proxy or network topology: deployers
# bring their own network policy.

# ── Per-workspace engine-worker template (DAT-505) ─────────────────────────
# A workspace = one engine container + one task queue + one catalog schema in
# the shared catalog DB (DAT-815) + one s3://<ws>/ prefix. These anchors hold
# everything COMMON to every workspace's worker; each per-workspace service
# (engine-worker, engine-worker-2, …) merges them and overrides only the three
# routing knobs (workspace id, queue, lake prefix). Workspaces are CREATED by
# the provisioner (DAT-820, `bun run workspace:create` / the portal role): it
# clones the seed `engine-worker` + `cockpit` containers' config and overrides
# the routing knobs + per-workspace secrets — these compose services are the
# template, not something to hand-copy per workspace.
x-engine-worker-base: &engine-worker-base
  build:
    context: ../engine
    dockerfile: docker/worker.Dockerfile
  depends_on:
    postgres:
      condition: service_healthy
    temporal:
      condition: service_healthy
    temporal-create-namespace:
      condition: service_completed_successfully
    seaweedfs-init:
      condition: service_completed_successfully
  volumes:
    # No lake volume and no sources bind-mount — both the lake and the file
    # sources live on the object store now (DAT-388 lake, DAT-389 ingest). The
    # engine reads source files straight from their s3:// URI over httpfs; the
    # only mount left is the read-only config tree.
    - ${HOST_CONFIG_DIR:-../dataraum-config}:/opt/dataraum/config:ro

# Env COMMON to every workspace's worker — the per-workspace service appends the
# three routing overrides (workspace id, TEMPORAL_TASK_QUEUE, DUCKLAKE_DATA_PATH).
# S3 creds are plain env (single source is .env).
x-engine-worker-env: &engine-worker-env
  DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  # ONE installation-wide DuckLake catalog DB (DAT-815), shared by every
  # workspace's worker: the per-workspace split is the ws_<id> METADATA_SCHEMA
  # the worker derives from its DATARAUM_WORKSPACE_ID at bootstrap — the URL
  # carries no per-workspace DB name, so it is common env, not a routing knob.
  DUCKLAKE_CATALOG_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${DUCKLAKE_CATALOG_DB}
  S3_ENDPOINT: ${S3_ENDPOINT}
  S3_REGION: ${S3_REGION:-us-east-1}
  S3_USE_SSL: ${S3_USE_SSL:-false}
  S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
  S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
  # The lake bucket the engine's source-URI validator allows (DAT-389): a
  # registered source URI must be s3://${S3_BUCKET}/<key> — never a local path
  # or a foreign bucket. The per-workspace DUCKLAKE_DATA_PATH is built from it.
  S3_BUCKET: ${S3_BUCKET}
  DATARAUM_CONFIG_PATH: /opt/dataraum/config
  PROMPT_DUMP_DIR: ${PROMPT_DUMP_DIR:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  TEMPORAL_HOST: ${TEMPORAL_HOST:-temporal:7233}
  TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
  # OTLP telemetry sink (ADR-0019/DAT-705). This env var IS the vendor seam:
  # everything speaks OTLP to whatever it names; unset/empty = telemetry off.
  # Defaults to the in-stack otel-lgtm collector so composed dev traces work
  # out of the box.
  OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-lgtm:4318}
  # Passwords for the two per-workspace roles the bootstrap mints (DAT-816):
  # ws_<id>_reader (search_path = ws_<id>_read, SELECT only — the cockpit's
  # METADATA_DATABASE_URL) and ws_<id>_writer (search_path = ws_<id>, exactly
  # the control-table verbs — the cockpit's METADATA_WRITER_DATABASE_URL). The
  # ROLE resolves the schema (ADR-0008/DAT-453 enforcement); role names embed
  # the workspace id. The secret is PER CONTAINER = PER WORKSPACE: these
  # shared dev values cover only the compose-defined seed pair(s); a
  # provisioned workspace (DAT-820) gets its own minted secrets injected by
  # the provisioning driver, overriding exactly these two vars.
  METADATA_READER_PASSWORD: ${METADATA_READER_PASSWORD:-cockpit-reader-dev}
  METADATA_WRITER_PASSWORD: ${METADATA_WRITER_PASSWORD:-cockpit-writer-dev}

services:
  postgres:
    # PG19 for SQL/PGQ property graphs (DAT-726 / ADR-0021) — the operating-model
    # knowledge graph is `CREATE PROPERTY GRAPH` over the ws_<id>_read views, which
    # is core-Postgres only from 19. On 19beta1 until GA (a version bump); verified
    # drop-in for everything else we run.
    image: postgres:19beta1
    # max_connections raised from the default 100: this single instance backs
    # ~four pooled consumers — Temporal (server + visibility ≈ 40 at rest),
    # cockpit_db, the engine ORM, and the DuckLake catalog pool. A live
    # operating_model run peaked at 103 against the default 100 (DAT-456 smoke),
    # surviving only on the 3 superuser-reserved slots. 200 restores real
    # headroom; it is provisioning for the legitimate consumer count, NOT a
    # band-aid for the (already right-sized, =16) DuckLake pool.
    command: ["postgres", "-c", "max_connections=200"]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # The ONE installation-wide DuckLake catalog database (DAT-815), created
      # at postgres first-boot by init-databases.sh. Every workspace's catalog
      # lives in it as its own ws_<id> METADATA_SCHEMA, created by the
      # worker's ATTACH itself — no per-workspace DB (or schema) allocation
      # anywhere in first-boot.
      DUCKLAKE_CATALOG_DB: ${DUCKLAKE_CATALOG_DB}
      # COCKPIT_DB is created at postgres first-boot by init-databases.sh
      # alongside the catalog DBs. Holds the cockpit's own state
      # (workspaces registry, chat history, ui_state) — separate database
      # so the cockpit can `drizzle-kit push` without ever touching the
      # engine's metadata schema.
      COCKPIT_DB: ${COCKPIT_DB}
    volumes:
      # PG18+ stores data in a major-version-specific subdir and declares its
      # VOLUME at /var/lib/postgresql (NOT .../data). The image refuses to boot
      # if a volume is mounted at the old .../data path (docker-library #1259),
      # so the mount is the parent and PGDATA defaults to .../19/docker (18→19
      # bump, DAT-726). A stale 18/docker dir in the volume is inert; sweep a
      # dev/CI volume with `down -v` on the major bump (data is re-seeded).
      - postgres_data:/var/lib/postgresql
      - ../engine/docker/postgres-init/:/docker-entrypoint-initdb.d/:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Object store — SeaweedFS S3 (DAT-388) ───────────────────────────────
  # The DuckLake lake lives on S3 now: the engine writes parquet to the bucket
  # and the cockpit reads it (both via DuckDB httpfs + an S3 secret). Dev runs a
  # single-node SeaweedFS with the S3 gateway open (anonymous) — the credentials
  # the engine/cockpit present are accepted-but-unverified locally; prod uses a
  # real object store with real IAM. EPHEMERAL by design: no named volume, so
  # `-dir=/data` lives on the container layer and is wiped on recreate (like the
  # DB is re-seeded), which is why the bucket is (re)created by seaweedfs-init.
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    # One process: master (:9333) + volume (:8080) + filer (:8888) + S3 (:8333).
    # -ip advertises the compose service name so internal addressing resolves.
    command: server -dir=/data -ip=seaweedfs -ip.bind=0.0.0.0 -filer -s3
    ports:
      # S3 API, bound 0.0.0.0 (no 127.0.0.1 prefix — see compose-ports gotcha)
      # so `sbx ports --publish 8333` can reach it from the host.
      - "8333:8333"
    healthcheck:
      # Probe the FILER (:8888), NOT the S3 root (:8333): the S3 endpoint returns
      # 403 even when healthy, which would hang `up --wait`. The filer is the
      # readiness signal the S3 gateway + bucket ops actually depend on.
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8888/ || exit 1"]
      interval: 5s
      timeout: 3s
      start_period: 15s
      retries: 30

  # One-shot: create the lake bucket once the gateway is healthy, then exit.
  # The engine + cockpit gate on its successful completion (SeaweedFS does not
  # reliably auto-create buckets), mirroring temporal-create-namespace.
  seaweedfs-init:
    image: chrislusf/seaweedfs:latest
    restart: on-failure:5
    depends_on:
      seaweedfs:
        condition: service_healthy
    environment:
      S3_BUCKET: ${S3_BUCKET:-dataraum-lake}
      SEAWEEDFS_MASTER: seaweedfs:9333
      SEAWEEDFS_FILER: seaweedfs:8888
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh"]
    command: /scripts/create-bucket.sh

  # ── Temporal (DAT-344) ──────────────────────────────────────────────────
  # Adapted from temporalio/samples-server compose/docker-compose-postgres.yml
  # (the canonical non-deprecated path — temporalio/auto-setup is retired). The
  # sample's bundled `postgresql` service is dropped: all three Temporal DB
  # consumers point at our existing `postgres` service, so the `temporal` +
  # `temporal_visibility` databases live in the one instance alongside
  # dataraum / dataraum_lake_catalog / cockpit_db. No second Postgres.

  # One-shot schema setup: creates + migrates the temporal/temporal_visibility
  # databases, then exits. The server waits on its successful completion.
  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    restart: on-failure:6
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      SQL_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh"]
    command: /scripts/setup-postgres.sh

  temporal:
    image: temporalio/server:${TEMPORAL_VERSION}
    depends_on:
      temporal-admin-tools:
        condition: service_completed_successfully
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      BIND_ON_IP: 0.0.0.0
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    ports:
      - "7233:7233"
    healthcheck:
      # `nc -z` is what the canonical sample uses for the server image (it ships
      # no `temporal` CLI). The create-namespace one-shot below does the real
      # gRPC `temporal operator cluster health` gate before it registers the
      # namespace, so a healthy `temporal` + a completed create-namespace
      # together prove the frontend is actually serving RPCs.
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 60

  # One-shot: registers the `default` namespace once the server is healthy,
  # then exits. `temporal-ui` depends on its successful completion (below) so
  # that `docker compose up --wait` — which tracks the long-running ui — counts
  # this job's exit-0 as success instead of failing on a stray exited
  # container. The P2 engine worker also depends_on it (a namespace must exist
  # before a worker can poll); multiple completed_successfully dependents are
  # fine.
  temporal-create-namespace:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      DEFAULT_NAMESPACE: default
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    depends_on:
      temporal:
        condition: service_healthy
      # Gate ui on namespace registration so `up --wait` treats the one-shot's
      # completion as success (see temporal-create-namespace above).
      temporal-create-namespace:
        condition: service_completed_successfully
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      # Subdomain origins added (DAT-819): the /workflows section embeds this
      # UI from the per-workspace cockpit origins behind Caddy.
      TEMPORAL_CORS_ORIGINS: http://localhost:3000,http://ws1.dataraum.localhost,http://ws2.dataraum.localhost
    ports:
      - "8080:8080"

  # ── Observability — grafana/otel-lgtm (ADR-0019 / DAT-705) ──────────────
  # All-in-one dev telemetry backend: OTel collector (OTLP :4317 gRPC /
  # :4318 HTTP) + Tempo (traces) + Loki (logs) + Prometheus (metrics) +
  # Grafana. Dev-grade by design (single node, no retention story) — the
  # production backend is deliberately deferred; swapping it is only an
  # OTEL_EXPORTER_OTLP_ENDPOINT change (ADR-0019). Nothing depends_on this
  # service: OTel batch exporters buffer and drop gracefully if it lags, so
  # app boot never gates on telemetry. (`up -d --wait` DOES wait on this
  # healthcheck like every service's — that gates the compose command, not
  # app boot.)
  otel-lgtm:
    image: grafana/otel-lgtm:latest
    ports:
      # Grafana — host 3001 (3000 is the cockpit).
      - "3001:3000"
      # OTLP, bound 0.0.0.0 (compose-ports gotcha) so host-dev processes
      # (cockpit `bun --bun run dev`, `uv run python -m dataraum.worker.main`)
      # export to localhost:4318 while in-stack services use otel-lgtm:4318.
      - "4317:4317"
      - "4318:4318"
    healthcheck:
      # The image touches /tmp/ready once collector + backends are up (the
      # readiness signal its own examples use).
      test: ["CMD", "cat", "/tmp/ready"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 30

  # Engine Temporal activity worker (DAT-344, parameterized per workspace by
  # DAT-505). The engine is a pure activity worker — no HTTP port. ONE container
  # per workspace: it bootstraps that workspace's ConnectionManager + DuckLake
  # anchor (materializing ws_<id> + its ws_<id> catalog schema in the shared
  # catalog DB — DAT-815 — on its OWN s3://<ws>/lake prefix) and polls EXACTLY
  # its own queue `engine-<workspace_id>`. The shared base (anchor below)
  # carries everything common; each per-workspace service overrides the three
  # routing knobs: workspace id, queue, lake prefix. "Create a workspace" in
  # dev = a registry insert + adding such a service. Health = the worker
  # heartbeat (`temporal worker list`), not a probe.
  engine-worker:
    <<: *engine-worker-base
    environment:
      <<: *engine-worker-env
      DATARAUM_WORKSPACE_ID: ${DATARAUM_WORKSPACE_ID:-00000000-0000-0000-0000-000000000001}
      # Per-workspace queue (DAT-505) — engine-<workspace_id>. The worker asserts
      # this matches DATARAUM_WORKSPACE_ID at boot (server/workspace.py), and the
      # cockpit drivers route here from the registry row.
      TEMPORAL_TASK_QUEUE: engine-${DATARAUM_WORKSPACE_ID:-00000000-0000-0000-0000-000000000001}
      # Per-workspace S3 lake prefix (DAT-505): the lake parquet lives under
      # this workspace's own s3://<bucket>/<ws>/lake prefix. (The catalog is
      # the shared DUCKLAKE_CATALOG_URL in the common env — DAT-815.)
      DUCKLAKE_DATA_PATH: s3://${S3_BUCKET}/${DATARAUM_WORKSPACE_ID:-00000000-0000-0000-0000-000000000001}/lake

  # Second workspace worker (DAT-505) — behind the `multi-workspace` profile so a
  # default `up` stays single-workspace. Bring it up for the two-workspace
  # side-by-side smoke (`--profile multi-workspace`): a SECOND container, a second
  # queue (engine-<ws2>), a second ws_<id> schema, a second ws_<id> catalog
  # schema in the SAME catalog DB (DAT-815), and a second s3://<bucket>/<ws2>/lake
  # prefix — fully isolated from workspace 1.
  engine-worker-2:
    <<: *engine-worker-base
    profiles: ["multi-workspace"]
    environment:
      <<: *engine-worker-env
      DATARAUM_WORKSPACE_ID: ${DATARAUM_WORKSPACE_ID_2:-00000000-0000-0000-0000-000000000002}
      TEMPORAL_TASK_QUEUE: engine-${DATARAUM_WORKSPACE_ID_2:-00000000-0000-0000-0000-000000000002}
      DUCKLAKE_DATA_PATH: s3://${S3_BUCKET}/${DATARAUM_WORKSPACE_ID_2:-00000000-0000-0000-0000-000000000002}/lake

  # One-shot: apply the cockpit_db migrations (DAT-461) before the cockpit
  # serves. Uses the cockpit image's `build` stage — it carries drizzle-kit + the
  # source + the committed migrations under drizzle/cockpit/ (the slim runner
  # does not). The cockpit waits on its successful completion. Registry/actor
  # seeding is lazy in the app (resolveActiveWorkspace), so this is schema-only.
  # If this fails (after 5 retries), the cockpit blocks on
  # service_completed_successfully — check COCKPIT_DATABASE_URL / COCKPIT_DB.
  cockpit-migrate:
    build:
      context: ../cockpit
      target: build
    restart: on-failure:5
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      COCKPIT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${COCKPIT_DB}
    command: ["bun", "run", "db:migrate:cockpit"]

  cockpit:
    build:
      context: ../cockpit
    depends_on:
      postgres:
        condition: service_healthy
      cockpit-migrate:
        condition: service_completed_successfully
      # engine-worker bootstraps the ws_<id> metadata schema the cockpit reads
      # via Drizzle. No healthcheck on the worker (its health is the Temporal
      # heartbeat), so gate on service_started; the smoke additionally waits for
      # the worker heartbeat before the drift check.
      engine-worker:
        condition: service_started
      seaweedfs-init:
        condition: service_completed_successfully
      temporal-ui:
        condition: service_started
    environment:
      # cockpit_db — TanStack Start side of the substrate. Created at
      # postgres first-boot by init-databases.sh. Holds workspaces
      # registry + chat history + ui_state.
      COCKPIT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${COCKPIT_DB}
      # Engine metadata — the two per-workspace ROLES the engine bootstrap
      # mints (DAT-816). Each role's search_path resolves the schema, so the
      # cockpit carries no ws_<id> literal in code: the reader sees the
      # promoted-read views ONLY (ADR-0008/DAT-453 — raw run-stamped tables are
      # not even visible); the writer holds exactly the control-table verbs.
      # The role NAMES embed the workspace id — these URLs are the bootstrap
      # workspace's; the provisioner (DAT-820) owns per-workspace wiring.
      METADATA_DATABASE_URL: postgresql://ws_00000000_0000_0000_0000_000000000001_reader:${METADATA_READER_PASSWORD:-cockpit-reader-dev}@postgres:5432/${POSTGRES_DB}
      METADATA_WRITER_DATABASE_URL: postgresql://ws_00000000_0000_0000_0000_000000000001_writer:${METADATA_WRITER_PASSWORD:-cockpit-writer-dev}@postgres:5432/${POSTGRES_DB}
      # Active workspace_id — same value the engine-worker bootstraps.
      # Drives `bun run db:pull:metadata` schemaFilter + the metadata
      # client's search_path resolution. Must match what the engine
      # was bootstrapped with or drizzle pulls from the wrong schema.
      DATARAUM_WORKSPACE_ID: ${DATARAUM_WORKSPACE_ID:-00000000-0000-0000-0000-000000000001}
      # Subdomain + auth (DAT-819, DD/51740673). The subdomain label is seeded
      # onto this workspace's registry row so the portal can route here —
      # `ws1.dataraum.localhost` is the matching seeded Caddy route
      # (caddy/caddy.json). The auth secret + portal origin must be IDENTICAL
      # across the portal and every workspace cockpit: the portal issues the
      # parent-domain session cookie, this cockpit verifies it against the
      # shared cockpit_db. The dev credential user is seeded lazily by the
      # registry (membership in THIS workspace); unset both to disable.
      DATARAUM_WORKSPACE_SUBDOMAIN: ${DATARAUM_WORKSPACE_SUBDOMAIN:-ws1}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dataraum-dev-secret}
      DATARAUM_PORTAL_ORIGIN: ${DATARAUM_PORTAL_ORIGIN:-http://dataraum.localhost}
      DATARAUM_DEV_USER_EMAIL: ${DATARAUM_DEV_USER_EMAIL:-dev@dataraum.dev}
      DATARAUM_DEV_USER_PASSWORD: ${DATARAUM_DEV_USER_PASSWORD:-dataraum-dev}
      # Lake DATA_PATH on the object store (DAT-388/505). s3:// URI — must match
      # engine-worker 1's DUCKLAKE_DATA_PATH byte-for-byte (the cockpit ATTACHes
      # the same lake READ_ONLY). Per-workspace prefix now: s3://<bucket>/<ws>/lake.
      # The cockpit reads ONE workspace's lake (the env-designated active one);
      # the per-request switcher across workspaces is DAT-357. Uploads write to
      # the same bucket via @aws-lite (DAT-386, now under <ws>/uploads/); there is
      # no shared filesystem. S3 creds are plain env (single source is .env).
      DATARAUM_LAKE_PATH: s3://${S3_BUCKET}/${DATARAUM_WORKSPACE_ID:-00000000-0000-0000-0000-000000000001}/lake
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      # Bucket the upload entry-mode (DAT-386) stages files into, under the
      # uploads/ prefix — the SAME bucket as DATARAUM_LAKE_PATH's lake/ prefix.
      # The cockpit needs it explicitly to address PutObject (it can't infer the
      # bucket from the lake path, which carries the lake/ suffix).
      S3_BUCKET: ${S3_BUCKET}
      # DuckLake catalog (DAT-367/815) — the ONE installation-wide catalog DB.
      # The cockpit ATTACHes it READ_ONLY for the interactive read verbs
      # (run_sql), selecting the active workspace's catalog via the ws_<id>
      # METADATA_SCHEMA it derives from DATARAUM_WORKSPACE_ID — the same schema
      # that workspace's engine-worker writes. Bare postgresql:// libpq form
      # (DuckDB's postgres extension wants it, not the +psycopg SQLAlchemy
      # scheme); pairs with the DATARAUM_LAKE_PATH above.
      DUCKLAKE_CATALOG_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${DUCKLAKE_CATALOG_DB}
      # Config (DAT-361) — read-only access to vertical YAMLs for future UX
      # hints ("which concept did the agent bind to?"). No consumers yet; the
      # mount + path are plumbing. Same package, same path as the engine.
      DATARAUM_CONFIG_PATH: /opt/dataraum/config
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Temporal (DAT-363 cornerstone for DAT-344). Optional in slice-1 — the
      # cockpit's Zod config treats these as optional and the Temporal client
      # lands in DAT-344; empty values keep the stack healthy until then.
      TEMPORAL_HOST: ${TEMPORAL_HOST:-}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-}
      # OTLP telemetry sink (ADR-0019/DAT-705) — same seam as the engine
      # worker's; unset/empty = telemetry off.
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-lgtm:4318}
    volumes:
      # No lake volume — the lake is on the object store now (DAT-388).
      # Read-only config (DAT-361) — see DATARAUM_CONFIG_PATH above.
      - ${HOST_CONFIG_DIR:-../dataraum-config}:/opt/dataraum/config:ro
    ports:
      - "3000:3000"
    healthcheck:
      # /api/health, not `/`: the membership gate (DAT-819) 401s signed-out
      # requests, and a healthcheck has no session.
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ── Workspace 2's cockpit (DAT-819) — the two-workspace smoke pair ────────
  # Mirrors `cockpit` with workspace 2's identity, reached through Caddy at
  # ws2.dataraum.localhost. Same shared cockpit_db; isolation is the DAT-817
  # boot-scope. The metadata role NAMES embed the default ws-2 id — like
  # cockpit's, these URLs are the smoke pair's; the provisioner (DAT-820) owns
  # real per-workspace wiring.
  cockpit-2:
    profiles: ["multi-workspace"]
    build:
      context: ../cockpit
    depends_on:
      postgres:
        condition: service_healthy
      cockpit-migrate:
        condition: service_completed_successfully
      engine-worker-2:
        condition: service_started
      seaweedfs-init:
        condition: service_completed_successfully
      temporal-ui:
        condition: service_started
    environment:
      COCKPIT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${COCKPIT_DB}
      METADATA_DATABASE_URL: postgresql://ws_00000000_0000_0000_0000_000000000002_reader:${METADATA_READER_PASSWORD:-cockpit-reader-dev}@postgres:5432/${POSTGRES_DB}
      METADATA_WRITER_DATABASE_URL: postgresql://ws_00000000_0000_0000_0000_000000000002_writer:${METADATA_WRITER_PASSWORD:-cockpit-writer-dev}@postgres:5432/${POSTGRES_DB}
      DATARAUM_WORKSPACE_ID: ${DATARAUM_WORKSPACE_ID_2:-00000000-0000-0000-0000-000000000002}
      DATARAUM_WORKSPACE_SUBDOMAIN: ${DATARAUM_WORKSPACE_SUBDOMAIN_2:-ws2}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dataraum-dev-secret}
      DATARAUM_PORTAL_ORIGIN: ${DATARAUM_PORTAL_ORIGIN:-http://dataraum.localhost}
      DATARAUM_DEV_USER_EMAIL: ${DATARAUM_DEV_USER_EMAIL:-dev@dataraum.dev}
      DATARAUM_DEV_USER_PASSWORD: ${DATARAUM_DEV_USER_PASSWORD:-dataraum-dev}
      DATARAUM_LAKE_PATH: s3://${S3_BUCKET}/${DATARAUM_WORKSPACE_ID_2:-00000000-0000-0000-0000-000000000002}/lake
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      DUCKLAKE_CATALOG_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${DUCKLAKE_CATALOG_DB}
      DATARAUM_CONFIG_PATH: /opt/dataraum/config
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TEMPORAL_HOST: ${TEMPORAL_HOST:-}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-lgtm:4318}
    volumes:
      - ${HOST_CONFIG_DIR:-../dataraum-config}:/opt/dataraum/config:ro
    ports:
      # Caddy-bypass debug port only (3001 is Grafana). The real path is
      # http://ws2.dataraum.localhost via Caddy.
      - "3002:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ── Portal (DAT-819, DD/51740673) — login, membership routing, provisioner ─
  # The SAME cockpit image in its second role (DATARAUM_PORTAL_MODE=1): serves
  # the parent domain (http://dataraum.localhost through Caddy), owns better-auth
  # sign-in, lists the user's workspaces from cockpit_db memberships, and links
  # each to its subdomain. Carries the base env (config.base.ts) — no workspace
  # identity, no metadata roles: a workspace surface reached here fails
  # born-loud by design — PLUS the provisioner block (DAT-820,
  # src/portal/provisioner-config.ts): the workspace-lifecycle ops live in this
  # role, so it holds the INSTALLATION-admin surface. The docker socket mount is
  # the compose provisioning driver's seam (root-equivalent on this host —
  # dev/single-host posture; a real deployment swaps the driver, not the
  # lifecycle). The provisioner CLONES the seed `engine-worker`/`cockpit`
  # services' container config for every new workspace, so those two services
  # double as the per-workspace env template — new env vars added to them flow
  # into provisioned workspaces automatically.
  portal:
    build:
      context: ../cockpit
    depends_on:
      postgres:
        condition: service_healthy
      cockpit-migrate:
        condition: service_completed_successfully
    environment:
      DATARAUM_PORTAL_MODE: "1"
      COCKPIT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${COCKPIT_DB}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-dataraum-dev-secret}
      DATARAUM_PORTAL_ORIGIN: ${DATARAUM_PORTAL_ORIGIN:-http://dataraum.localhost}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://otel-lgtm:4318}
      # Provisioner (DAT-820) — installation-admin connections for the
      # lifecycle ops: role mint + schema drops on the primary DB, catalog
      # schema create/drop, Caddy route add/remove, S3 prefix sweep.
      PROVISIONER_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DUCKLAKE_CATALOG_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${DUCKLAKE_CATALOG_DB}
      CADDY_ADMIN_URL: http://caddy:2019
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_REGION: ${S3_REGION:-us-east-1}
      S3_USE_SSL: ${S3_USE_SSL:-false}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY}
      S3_BUCKET: ${S3_BUCKET}
      # Compose driver knobs (defaults match this stack; see
      # provisioner-config.ts for the reference-service defaults).
      PROVISIONER_COMPOSE_PROJECT: ${COMPOSE_PROJECT_NAME:-infra}
    volumes:
      # The Docker Engine API — the compose provisioning driver (DAT-820).
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 6

  # ── Caddy (DAT-819) — per-workspace subdomain termination ─────────────────
  # The installation's ONE ingress: `<subdomain>.dataraum.localhost` routes to
  # that workspace's cockpit, the bare parent domain to the portal. Dev config
  # is FILE-seeded (caddy/caddy.json: ws1 + ws2 + portal, @id-tagged routes,
  # default workspace ids — a custom id means the admin API, i.e. the
  # provisioner path) and reloads fresh each `up`; admin-API changes are
  # deliberately ephemeral in dev (the provisioner re-asserts routes; `--resume`
  # persistence is a deploy concern). The admin API on :2019 IS the DAT-820
  # provisioner seam (src/portal/caddy.ts) — published for dev/smoke like every
  # other port here (see the sbx note); it accepts arbitrary config, so any
  # non-local deployment must scope it to the compose network.
  #
  # Dev domain story: Chromium/Firefox resolve *.localhost (any depth) to
  # 127.0.0.1 natively — open http://dataraum.localhost, no /etc/hosts edit.
  # Safari and curl use the system resolver: add the three hosts to /etc/hosts
  # or use `curl --resolve ws1.dataraum.localhost:80:127.0.0.1 …`.
  caddy:
    image: caddy:2-alpine
    command: ["caddy", "run", "--config", "/etc/caddy/caddy.json"]
    volumes:
      - ./caddy/caddy.json:/etc/caddy/caddy.json:ro
    ports:
      # Override the host port when :80 is taken (CADDY_HTTP_PORT=8000 →
      # http://dataraum.localhost:8000); DATARAUM_PORTAL_ORIGIN must then
      # carry the same port so portal links and the cookie derivation agree.
      - "${CADDY_HTTP_PORT:-80}:80"
      - "2019:2019"
    healthcheck:
      # `caddy version` proves the binary; the admin API proves the config
      # loaded (it serves only after a successful load).
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:2019/config/"]
      interval: 5s
      timeout: 3s
      retries: 6

volumes:
  postgres_data:
