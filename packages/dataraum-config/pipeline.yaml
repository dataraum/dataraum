# Pipeline Configuration
#
# Per-phase metadata for the analysis pipeline. Per-phase config lives in
# config/phases/<name>.yaml. Execution order is owned by the Temporal worker
# (AddSourceWorkflow), not by this file. `detectors` lists the entropy
# detectors run as post-steps after each phase completes.

version: "2.0.0"

phases:
  # =========================================================================
  # Zone 1: Foundation
  # =========================================================================
  import:
    description: Load data files into raw tables

  typing:
    description: Type inference and resolution
    detectors: [type_fidelity, null_semantics]

  statistics:
    description: Statistical profiling of typed tables
    # slice_conditional_null (DAT-473): conditions the column's null mask on each sibling
    # low-cardinality categorical (Cramér's V), reading concentration the flat null_ratio
    # is blind to. Declared here — distinct_count is available post-profiling — and runs
    # at the terminal source detect with the typed table in scope.
    detectors: [null_ratio, slice_conditional_null]

  column_eligibility:
    description: Column eligibility evaluation

  statistical_quality:
    description: "Benford's Law and outlier detection"

  relationships:
    description: Cross-table relationship detection

  temporal:
    description: Temporal pattern and trend analysis

  semantic_per_column:
    description: Per-column LLM annotation (roles, concepts, business terms)
    # temporal_behavior (DAT-445) is declared here — per column it pools the ontology
    # temporal_behavior prior these annotations carry against the LLM's independent
    # stock/flow claim. It runs at the terminal source-wide detect, after every
    # column's annotation is written, so load_semantic resolves both witnesses; the
    # resolved layer then writes the adjudicated behaviour + contested flag back.
    detectors: [business_meaning, unit_entropy, temporal_entropy, benford, temporal_behavior]

  semantic_per_table:
    description: Per-table LLM synthesis (structural roles, relationships) over annotations
    # relationship_discovery (ADR-0009): pools the witness classes already on the
    # focal pair's rows (candidate value-overlap stats, llm confirmation, manual/
    # keeper teaches) into {genuine, spurious} — runs at the terminal session
    # detect, after the catalog (llm + materialized overlays) is complete.
    # unit_source moved to catalogue_semantics (DAT-823) with the authoring it reads.
    detectors: [join_path_determinism, relationship_entropy, relationship_discovery]

  # =========================================================================
  # Zone 2: Enrichment
  # =========================================================================
  surrogate_mint:
    description: Mint surrogate-key columns for LLM-confirmed composite keys (DAT-277)
    # Deterministic, no LLM — reads this run's surrogate_key_intents (written by
    # semantic_per_table), re-materializes both typed tables with the hash column
    # on the DAT-414 recipe substrate, and persists the single-column surrogate
    # relationship the enriched views + SQL agents then consume.

  enriched_views:
    description: Create enriched views joining fact + dimension tables
    detectors: [dimension_coverage]

  slicing:
    description: LLM-powered slice dimension identification (the dimension catalog)
    # DAT-536: slice materialization (slicing_view / slice_analysis /
    # temporal_slice_analysis) removed — the structural_reconciliation substrate is
    # now aggregated inline over the enriched views in aggregation_lineage.
    # dimensional_entropy lost its run site here; its formal cut is DAT-539.

  catalogue_semantics:
    description: Catalogue-horizon business semantics — table readings + column concepts (LLM)
    # DAT-823: the authoring half the per-table tier used to carry, moved to where
    # its evidence exists — after enriched_views + slicing, before the
    # dimension_hierarchies conform judge.
    # unit_source (DAT-647): the SEMANTIC half of unit detection — reads
    # ColumnConcept.unit_source_column, authored by THIS phase under the
    # begin_session run, so it must run at the session detect where the catalogue
    # grain exists. The value-carried half (unit_entropy) stays on
    # semantic_per_column (add_source, typing grain).
    detectors: [unit_source]

  dimension_hierarchies:
    description: Deterministic g3 FD pass — drill-down hierarchies + 1:1 aliases over the slice catalog
    # DAT-537: no detectors and no LLM — reads slicing's grain-safe dimension catalog
    # and the grain-verified enriched views, writes run-versioned drill-down chains
    # (zip → city → state) + alias groups. Consumed by the answer agent (DAT-538) and
    # the driver tree (DAT-545, which uses alias collapse to de-confound its ranking).

  aggregation_lineage:
    description: Events→measure rollup discovery, inline-aggregated over enriched views
    # temporal_behavior is declared HERE (DAT-491/536): at the session detect the
    # measurement re-adjudicates with the data-grounded structural_reconciliation
    # witness this phase just produced (inline GROUP BY over the enriched views) —
    # the witness that escapes name-anchoring. At add_source detect (no lineage rows
    # for that run) the witness abstains and the two-witness behaviour is unchanged.
    detectors: [temporal_behavior]

  correlations:
    description: Within-table correlation analysis
    detectors: [derived_value]

  driver_rankings:
    description: Per-measure driver discovery, persisted run-versioned over the enriched views
    # DAT-546: no detectors and no LLM — runs the validated driver-discovery engine
    # (DAT-545/561/563) over each measure-role column and writes one grain-labeled
    # DriverRankingArtifact per (measure_column_id, run_id). Read by the answer agent
    # (look_drivers, DAT-538).

  # =========================================================================
  # Zone 3: Interpretation
  # =========================================================================
  business_cycles:
    description: Expert LLM cycle detection
    detectors: []  # business_cycle_health cut (DAT-442); the cycle analysis stays

  validation:
    description: LLM-powered validation checks
    detectors: [cross_table_consistency]

  metrics:
    description: Compute metric graphs through the lifecycle (declare → compose → execute)

# Limits
limits:
  max_columns: 500  # Overall across all tables in a pipeline run
