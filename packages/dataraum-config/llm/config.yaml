# LLM Configuration
#
# Configure LLM providers for intelligent analysis features.
# When disabled, manual YAML configuration is required.

version: "1.0.0"

# Provider configurations
providers:
  anthropic:
    default_model: claude-sonnet-5
    models:
      fast: claude-haiku-4-5
      balanced: claude-sonnet-5

# Active provider
active_provider: anthropic

# Feature toggles
features:
  # DAT-362: per-column annotation is now the authoritative semantic_per_column
  # phase (Option B) — run it on the capable model, not the fast pre-pass tier.
  column_annotation:
    enabled: true
    model_tier: balanced
    effort: low

  semantic_analysis:
    enabled: true
    model_tier: balanced
    # Pin the API default explicitly (DAT-768). Omitting output_config.effort means
    # the Anthropic server-side default — currently "high" — so this is a no-op on
    # behavior, but it removes the hidden dependency on that default and states the
    # intent: semantic_per_table is a large batched extraction that also authors the
    # load-bearing column_concepts field, and must stay at high. The structural
    # anti-crowd-out fix is making column_concepts a REQUIRED tool-schema field
    # (models.py) so an omission is a validation error the repair turn catches.
    effort: high

  slicing_analysis:
    enabled: true
    model_tier: balanced
    # medium, not low (DAT-720): at effort:low Sonnet 5 scopes to the literal ask
    # and drops the secondary enriched time-axis backfill (a form-fill field it's
    # motivated enough to complete at medium). Thinking stays off — the data is in
    # the prompt; it just has to fill the field.
    effort: medium

  validation:
    enabled: true
    model_tier: balanced
    effort: low

  # DAT-735: agentic validation induction over the served graph. One dedicated home
  # (mirrors `validation`'s balanced tier today — zero behaviour change; the induction
  # reasons over the whole graph, so effort/thinking can be raised here independently).
  validation_induction:
    enabled: true
    model_tier: balanced
    effort: low

  # DAT-491: events→measure aggregation-lineage proposals (one batched call per
  # begin_session run; the deterministic reconciliation disposes the candidates).
  business_cycles:
    enabled: true
    model_tier: balanced
    # Pinned explicitly (DAT-807) — behaviourally a no-op (high IS the API
    # default), but every agent's effort is now declared, so a server-side
    # default change can never silently move a call site's configuration.
    effort: high

  enrichment_analysis:
    enabled: true
    model_tier: balanced
    effort: high
    prompt_file: prompts/enrichment_analysis.yaml
    description: >
      Identify valuable dimension joins to enrich main datasets
      with geographic, categorical, and reference data dimensions.
      Creates enriched views with no aggregations.

  why_analysis:
    enabled: true
    model_tier: balanced

  # DAT-603: metric grounding (graph_sql_generation) — the pipeline's most
  # central agent and its hardest reasoning task. `thinking: true` keeps the
  # model's adaptive reflection ON (Sonnet 5-class models expose no sampling
  # knobs; reflection is the quality lever — 2026-07-03 review). `effort: high`
  # is the API default written down (DAT-807): low is wrong here, this agent
  # needs the thinking.
  graph_sql_generation:
    enabled: true
    model_tier: balanced
    effort: high
    thinking: true

  # DAT-762: dimension-identity judge — the cross-fact conformed-dimension
  # lane (conform/role judgment on names + attributes + meanings).
  # Forced tool_choice suppresses thinking on the Anthropic API, so the v1
  # judge is non-thinking by design (DAT-757 scorecard was graded that way).
  # Covers BOTH judged labels (dimension_conform + dimension_alias).
  dimension_identity_judgment:
    model_tier: balanced
    effort: high

# Cost controls
limits:
  # Bumped 16000 -> 24000 with the Sonnet 5 swap: its tokenizer emits ~30% more
  # tokens for the same text, so a response that fit under 16000 on Sonnet 4.6
  # can now clip. 24000 restores the old margin. For the thinking-off extractors
  # this budget is response-only; for graph_sql_generation (thinking: true,
  # DAT-603) it is SHARED with the thinking trace — max_tokens caps both.
  # Measured 2026-07-03: ~3.7k mean output tokens/call incl. thinking, ample
  # headroom under 24000.
  max_output_tokens_per_request: 24000

# Privacy settings for data sent to LLM
privacy:
  max_sample_values: 10
  sensitive_patterns:
    - ".*email.*"
    - ".*phone.*"
    - ".*ssn.*"
    - ".*social_security.*"
    - ".*credit_card.*"
    - ".*password.*"
    - ".*secret.*"
    - ".*token.*"
    - ".*api_key.*"
