name: CI

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

jobs:
    test:
        runs-on: ubuntu-latest
        timeout-minutes: 30
        defaults:
            run:
                working-directory: packages/engine
        strategy:
            fail-fast: false
            matrix:
                python-version: ["3.14"]
        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7

            - name: Set up Python
              uses: actions/setup-python@v6
              with:
                  python-version: ${{ matrix.python-version }}

            - name: Install dependencies
              run: |
                  echo "${{ matrix.python-version }}" > .python-version
                  uv sync --group dev

            - name: Ruff check
              run: uv run ruff check src/

            - name: Ruff format check
              run: uv run ruff format --check src/

            - name: Type check
              run: uv run mypy src/

            - name: Dead code check (vulture)
              run: |
                  output=$(uv run vulture src/dataraum vulture_whitelist.py --min-confidence 80 2>&1 \
                    | grep -v "unreachable code after 'while'" || true)
                  if [ -n "$output" ]; then
                    echo "$output"
                    exit 1
                  fi

            - name: Run tests with coverage
              run: uv run pytest tests/unit tests/integration -q --cov --cov-report=term-missing --cov-report=xml

            - name: Upload coverage report
              if: always()
              uses: actions/upload-artifact@v7
              with:
                  name: coverage-report-${{ matrix.python-version }}
                  path: packages/engine/coverage.xml

    # Schema seam: SQLAlchemy models → schema.sql (offline dump) → scratch
    # Postgres → drizzle-kit pull. Both generated artifacts are checked in;
    # this job regenerates them and fails on any diff, so the engine schema,
    # packages/engine/schema.sql, and the cockpit's drizzle mirror can never
    # drift apart. No engine boot involved.
    schema-drift:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        steps:
            - uses: actions/checkout@v6

            - name: Install uv
              uses: astral-sh/setup-uv@v7

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.14"

            - name: Install cockpit deps
              working-directory: packages/cockpit
              run: bun install --frozen-lockfile

            - name: Regenerate schema.sql + drizzle mirror
              working-directory: packages/cockpit
              run: bun run db:pull:metadata

            - name: Fail on drift
              run: |
                  drift=$(git status --porcelain -- packages/engine/schema.sql packages/cockpit/src/db/metadata/)
                  if [ -n "$drift" ]; then
                      echo "::error::Schema drift: SQLAlchemy models differ from the checked-in schema.sql / drizzle mirror. Run 'bun run db:pull:metadata' in packages/cockpit and commit the result."
                      echo "$drift"
                      git diff -- packages/engine/schema.sql packages/cockpit/src/db/metadata/ || true
                      exit 1
                  fi

    # Cockpit quality gates (DAT-454). Deps are declared `latest` with bun.lock
    # owning resolution (NOTHING freezes — no version pins); the guards against
    # an SDK move are exactly these: tsc + the unit suite, which includes the
    # @tanstack/ai contract test (tool-chip-state.contract.test.ts) driving the
    # real chat()→SSE→ChatClient pipeline. `bun run build` catches the Nitro/
    # preset/externalization breakage class (duckdb-neo bindings, bun preset).
    # Integration tests need a real stack and stay out of this fast PR gate.
    # NOT path-filtered: engine PRs touching worker/contracts.py are
    # cross-package (the cockpit hand-mirrors the Temporal contracts).
    cockpit:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        defaults:
            run:
                working-directory: packages/cockpit
        steps:
            - uses: actions/checkout@v6

            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.14"

            - name: Install deps
              run: bun install --frozen-lockfile

            - name: Biome check
              run: bun run check

            - name: Type check
              run: bunx tsc --noEmit

            - name: Unit tests
              run: bun run test

            - name: Build
              run: bun run build

    # Single status for branch protection (matrix jobs report as "check (3.x)")
    check:
        if: always()
        needs: [test, docs, schema-drift, cockpit]
        runs-on: ubuntu-latest
        steps:
            - name: All checks passed
              run: |
                  if [ "${{ needs.test.result }}" != "success" ] || [ "${{ needs.docs.result }}" != "success" ] || [ "${{ needs.schema-drift.result }}" != "success" ] || [ "${{ needs.cockpit.result }}" != "success" ]; then
                    echo "test=${{ needs.test.result }} docs=${{ needs.docs.result }} schema-drift=${{ needs.schema-drift.result }} cockpit=${{ needs.cockpit.result }}"
                    exit 1
                  fi

    docs:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: packages/engine
        if: >-
            github.event_name == 'pull_request' ||
            (github.event_name == 'push' && github.ref == 'refs/heads/main')
        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-python@v6
              with:
                  python-version: "3.x"

            - name: Install zensical
              run: pip install zensical

            - name: Build docs
              run: zensical build --clean
