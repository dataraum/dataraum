# DataRaum platform stack — Postgres + control-plane (Python engine) + cockpit (TanStack Start).
#
# Run from workspace root:
#   docker compose -f packages/infra/docker-compose.yml --env-file packages/infra/.env up -d --wait
# Or via the root Makefile:
#   make up
#
# First run:
#   cp packages/infra/.env.example packages/infra/.env
#   make up
#   curl http://127.0.0.1:8000/health   # → {"status":"ok",...}
#   open http://127.0.0.1:3000

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DUCKLAKE_CATALOG_DB: ${DUCKLAKE_CATALOG_DB}
      # COCKPIT_DB is created at postgres first-boot by init-databases.sh
      # alongside DUCKLAKE_CATALOG_DB. Holds the cockpit's own state
      # (workspaces registry, chat history, ui_state) — separate database
      # so the cockpit can `drizzle-kit push` without ever touching the
      # engine's metadata schema.
      COCKPIT_DB: ${COCKPIT_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../engine/docker/postgres-init/:/docker-entrypoint-initdb.d/:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Temporal (DAT-344) ──────────────────────────────────────────────────
  # Adapted from temporalio/samples-server compose/docker-compose-postgres.yml
  # (the canonical non-deprecated path — temporalio/auto-setup is retired). The
  # sample's bundled `postgresql` service is dropped: all three Temporal DB
  # consumers point at our existing `postgres` service, so the `temporal` +
  # `temporal_visibility` databases live in the one instance alongside
  # dataraum / dataraum_lake_catalog / cockpit_db. No second Postgres.

  # One-shot schema setup: creates + migrates the temporal/temporal_visibility
  # databases, then exits. The server waits on its successful completion.
  temporal-admin-tools:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    restart: on-failure:6
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      SQL_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh"]
    command: /scripts/setup-postgres.sh

  temporal:
    image: temporalio/server:${TEMPORAL_VERSION}
    depends_on:
      temporal-admin-tools:
        condition: service_completed_successfully
    environment:
      DB: postgres12
      DB_PORT: "5432"
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PWD: ${POSTGRES_PASSWORD}
      BIND_ON_IP: 0.0.0.0
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
    volumes:
      - ./dynamicconfig:/etc/temporal/config/dynamicconfig:ro
    ports:
      - "127.0.0.1:7233:7233"
    healthcheck:
      # `nc -z` is what the canonical sample uses for the server image (it ships
      # no `temporal` CLI). The create-namespace one-shot below does the real
      # gRPC `temporal operator cluster health` gate before it registers the
      # namespace, so a healthy `temporal` + a completed create-namespace
      # together prove the frontend is actually serving RPCs.
      test: ["CMD", "nc", "-z", "localhost", "7233"]
      interval: 5s
      timeout: 3s
      start_period: 30s
      retries: 60

  # One-shot: registers the `default` namespace once the server is healthy,
  # then exits. `temporal-ui` depends on its successful completion (below) so
  # that `docker compose up --wait` — which tracks the long-running ui — counts
  # this job's exit-0 as success instead of failing on a stray exited
  # container. The P2 engine worker also depends_on it (a namespace must exist
  # before a worker can poll); multiple completed_successfully dependents are
  # fine.
  temporal-create-namespace:
    image: temporalio/admin-tools:${TEMPORAL_ADMINTOOLS_VERSION}
    restart: on-failure:5
    depends_on:
      temporal:
        condition: service_healthy
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      DEFAULT_NAMESPACE: default
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh"]
    command: /scripts/create-namespace.sh

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    depends_on:
      temporal:
        condition: service_healthy
      # Gate ui on namespace registration so `up --wait` treats the one-shot's
      # completion as success (see temporal-create-namespace above).
      temporal-create-namespace:
        condition: service_completed_successfully
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "127.0.0.1:8080:8080"

  control-plane:
    build:
      context: ../engine
      dockerfile: docker/control-plane.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # DATABASE_URL is consumed by SQLAlchemy (workspace + sessions); the
      # +psycopg dialect prefix is required — we ship psycopg v3, not psycopg2,
      # and the bare postgresql:// scheme falls back to the missing psycopg2
      # driver. DUCKLAKE_CATALOG_URL is consumed by DuckDB's postgres
      # extension (libpq), which accepts the bare postgresql:// scheme.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DUCKLAKE_CATALOG_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${DUCKLAKE_CATALOG_DB}
      DUCKLAKE_DATA_PATH: /var/lib/dataraum/lake
      # Config is the standalone dataraum-config package (DAT-361), bind-mounted
      # below at this path rather than baked into the image. First step toward a
      # swappable config backend (object store / ConfigMap).
      DATARAUM_CONFIG_PATH: /opt/dataraum/config
      # DATARAUM_HOME is the writable workspace state root (DAT-358).
      # bootstrap_workspace fails loud if it's unset; the mounted volume
      # (dataraum_workspace) gives it restart persistence.
      DATARAUM_HOME: /var/lib/dataraum/workspace
      # DATARAUM_WORKSPACE_ID is the active workspace pointer (DAT-339 pivot).
      # Engine resolves the Postgres schema name as ws_<id-with-dashes-as-_>
      # and sets search_path on every connection. bootstrap_workspace fails
      # loud if it's unset. Cockpit dev uses the same value to drive
      # drizzle-kit pull + the metadata client.
      DATARAUM_WORKSPACE_ID: ${DATARAUM_WORKSPACE_ID:-00000000-0000-0000-0000-000000000001}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Temporal (DAT-363 cornerstone for DAT-344). Optional in slice-1 — the
      # engine's typed Settings treats these as optional and there is no
      # Temporal service yet, so empty values keep the stack healthy. DAT-344
      # wires the activity worker and flips them to required.
      TEMPORAL_HOST: ${TEMPORAL_HOST:-}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-}
    volumes:
      - dataraum_lake:/var/lib/dataraum/lake
      - dataraum_workspace:/var/lib/dataraum/workspace
      - ${HOST_SOURCES_DIR:-../engine/sources}:/var/lib/dataraum/sources:ro
      # Config (DAT-361) — standalone dataraum-config package mounted read-only.
      # Same sibling dir, same in-container path for engine + cockpit.
      - ${HOST_CONFIG_DIR:-../dataraum-config}:/opt/dataraum/config:ro
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  # Engine Temporal activity worker (DAT-344). Same image as control-plane, but
  # runs the activity worker (`python -m dataraum.worker.main`) instead of the
  # Starlette shell (which P4 removes). Holds one workspace ConnectionManager +
  # DuckLake anchor and serves the phase activities (import, typing) on the
  # task queue. No HTTP port; no healthcheck yet — worker-health lands in P4.
  engine-worker:
    build:
      context: ../engine
      dockerfile: docker/control-plane.Dockerfile
    entrypoint: ["/app/.venv/bin/python", "-m", "dataraum.worker.main"]
    depends_on:
      postgres:
        condition: service_healthy
      temporal:
        condition: service_healthy
      temporal-create-namespace:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DUCKLAKE_CATALOG_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${DUCKLAKE_CATALOG_DB}
      DUCKLAKE_DATA_PATH: /var/lib/dataraum/lake
      DATARAUM_CONFIG_PATH: /opt/dataraum/config
      DATARAUM_HOME: /var/lib/dataraum/workspace
      DATARAUM_WORKSPACE_ID: ${DATARAUM_WORKSPACE_ID:-00000000-0000-0000-0000-000000000001}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TEMPORAL_HOST: ${TEMPORAL_HOST:-temporal:7233}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-default}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-dataraum-pipeline}
    volumes:
      - dataraum_lake:/var/lib/dataraum/lake
      - dataraum_workspace:/var/lib/dataraum/workspace
      - ${HOST_SOURCES_DIR:-../engine/sources}:/var/lib/dataraum/sources:ro
      - ${HOST_CONFIG_DIR:-../dataraum-config}:/opt/dataraum/config:ro

  cockpit:
    build:
      context: ../cockpit
      args:
        VITE_ENGINE_API_URL: http://localhost:8000
    depends_on:
      control-plane:
        condition: service_healthy
    environment:
      # cockpit_db — TanStack Start side of the substrate. Created at
      # postgres first-boot by init-databases.sh. Holds workspaces
      # registry + chat history + ui_state.
      COCKPIT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${COCKPIT_DB}
      # Engine metadata DB — same Postgres instance, different database.
      # The cockpit reads (Drizzle introspected schema) but never writes
      # here; the engine's SQLAlchemy models own the schema.
      METADATA_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      # Active workspace_id — same value the control-plane bootstraps.
      # Drives `bun run db:pull:metadata` schemaFilter + the metadata
      # client's search_path resolution. Must match what the engine
      # was bootstrapped with or drizzle pulls from the wrong schema.
      DATARAUM_WORKSPACE_ID: ${DATARAUM_WORKSPACE_ID:-00000000-0000-0000-0000-000000000001}
      # Mounted shared lake volume — Phase 2's add_source wizard writes
      # uploaded user files here from TS (Node fs); the engine reads
      # them via DuckLake from the same path. Same volume mounted on
      # both containers; same in-container path for symmetry.
      DATARAUM_LAKE_PATH: /var/lib/dataraum/lake
      # Config (DAT-361) — read-only access to vertical YAMLs for future UX
      # hints ("which concept did the agent bind to?"). No consumers yet; the
      # mount + path are plumbing. Same package, same path as the engine.
      DATARAUM_CONFIG_PATH: /opt/dataraum/config
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Temporal (DAT-363 cornerstone for DAT-344). Optional in slice-1 — the
      # cockpit's Zod config treats these as optional and the Temporal client
      # lands in DAT-344; empty values keep the stack healthy until then.
      TEMPORAL_HOST: ${TEMPORAL_HOST:-}
      TEMPORAL_NAMESPACE: ${TEMPORAL_NAMESPACE:-}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-}
    volumes:
      # Writable — the cockpit writes uploaded files into the lake
      # directory; the engine container reads them through the same
      # volume mounted at the same path. See DATARAUM_LAKE_PATH above.
      - dataraum_lake:/var/lib/dataraum/lake
      # Read-only config (DAT-361) — see DATARAUM_CONFIG_PATH above.
      - ${HOST_CONFIG_DIR:-../dataraum-config}:/opt/dataraum/config:ro
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
  dataraum_lake:
  # Workspace state — the writable config overlay populated by
  # bootstrap_workspace (DAT-358). Edits land here and survive
  # container restart / rebuild.
  dataraum_workspace:
