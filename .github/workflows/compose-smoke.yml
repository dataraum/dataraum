name: compose-smoke

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    compose-smoke:
        runs-on: ubuntu-latest
        timeout-minutes: 10
        defaults:
            run:
                working-directory: packages/infra
        steps:
            - uses: actions/checkout@v6

            - name: Seed .env from .env.example
              run: cp .env.example .env

            - name: Build and start the stack
              run: docker compose up -d --wait

            - name: Wait for the engine worker heartbeat (Status=Running)
              run: |
                  set -euo pipefail
                  # The engine is a Temporal activity worker, not an HTTP service
                  # (DAT-344) — its health is the worker heartbeat the Temporal
                  # server records. Poll it via the `temporal` CLI in the
                  # admin-tools image (the server/engine images ship no CLI).
                  # Status=Running also implies the worker finished bootstrapping
                  # its substrate (and the ws_<id> schema) before it began
                  # polling, which the drizzle drift check below relies on.
                  for i in $(seq 1 30); do
                      line=$(docker compose run --rm --no-deps --entrypoint temporal temporal-admin-tools \
                          worker list --namespace default --address temporal:7233 2>/dev/null \
                          | grep "dataraum-pipeline" || true)
                      if echo "$line" | grep -qi "running"; then
                          echo "engine worker is Running:"
                          echo "$line"
                          exit 0
                      fi
                      echo "worker not Running yet ($i/30)…"
                      sleep 5
                  done
                  echo "::error::engine worker did not reach Status=Running on dataraum-pipeline"
                  exit 1

            - name: Verify all three Postgres databases exist
              run: |
                  set -euo pipefail
                  # shellcheck disable=SC1091
                  . ./.env
                  dbs=$(docker compose exec -T postgres \
                      psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc \
                      "SELECT datname FROM pg_database WHERE datname IN ('$POSTGRES_DB','$DUCKLAKE_CATALOG_DB','$COCKPIT_DB') ORDER BY datname")
                  echo "Found databases:"
                  echo "$dbs"
                  echo "$dbs" | grep -qx "$POSTGRES_DB"
                  echo "$dbs" | grep -qx "$DUCKLAKE_CATALOG_DB"
                  echo "$dbs" | grep -qx "$COCKPIT_DB"

            - name: Verify the lake bucket exists in the object store
              run: |
                  set -euo pipefail
                  # The lake is on S3 now (DAT-388) — no shared filesystem. The
                  # engine ATTACHing the s3:// lake at bootstrap is already proven
                  # by the Status=Running gate above: bootstrap_lake loads httpfs,
                  # registers the S3 secret, and ATTACHes the s3:// DATA_PATH, all
                  # fail-loud, so a broken endpoint/secret/bucket means the worker
                  # never reports Running. Here we additionally assert seaweedfs-init
                  # created the bucket both sides point their lake path at.
                  # shellcheck disable=SC1091
                  . ./.env
                  buckets=$(docker compose exec -T seaweedfs sh -c \
                      'echo "s3.bucket.list" | weed shell -master=localhost:9333 -filer=localhost:8888' 2>/dev/null)
                  echo "Buckets:"; echo "$buckets"
                  echo "$buckets" | grep -q "$S3_BUCKET"

            # (The drizzle metadata drift check moved to ci.yml `schema-drift` —
            # it no longer needs the live stack: schema.sql is dumped offline
            # from the SQLAlchemy models and pulled via a scratch Postgres.)

            - name: Dump compose logs on failure
              if: failure()
              run: docker compose logs --no-color
