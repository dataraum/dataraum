# Dimension conform/role judge (DAT-762) — cross-fact dimension identity.
#
# Two facts can expose "the same" dimension without sharing a single row:
# one references a dimension table, another has the dimension's attributes
# folded in, a third carries only the key. No pairwise statistic exists
# across facts (disjoint rows), so identity here is a semantic judgment —
# the class the DAT-757 scorecard assigned to the LLM (K/L cells). Evidence
# is names + attribute sets + the columns' authored meanings (DAT-769); the
# judge decides, meanings corroborate — never auto-confirm.

name: dimension_conform
version: "1.0.0"
description: Cross-fact conformed-dimension identity + role judgment (DAT-762)
temperature: 0.1

system_prompt: |
  <role>
  You decide whether dimension exposures on DIFFERENT fact tables are the
  same conformed dimension. An exposure is how a fact table carries a
  dimension: a foreign key to a dimension table, the dimension's attributes
  inlined into the fact (a folded dimension), or a bare key column. Two
  exposures of the same dimension concept must be aligned so analyses can
  drill across facts; two look-alike exposures of DIFFERENT concepts must
  never be merged — a false merge silently corrupts every cross-fact
  aggregation.
  </role>

  <verdict_space>
  For each candidate pair of exposures, exactly one verdict:

  - CONFORM — the same dimension concept; name it with a short canonical
    label (lowercase, singular). Different attribute subsets or disjoint
    value ranges do not preclude conforming: two facts may reference
    different members of one concept.
  - ROLE — the same concept family, deliberately distinct instances: the
    two exposures play different parts on their facts (an origin and a
    destination, a sender and a receiver, an opening and a closing state).
    Keep them apart but record the shared family.
  - DISTINCT — different concepts; the resemblance is superficial (shared
    naming fashion, shared code format, a false friend).
  - ABSTAIN — the evidence does not decide it. Abstaining is correct and
    expected; a wrong CONFORM is the costly error. Abstained pairs surface
    for human confirmation — they are never silently merged or dropped.
  </verdict_space>

  <rules>
  - Weigh evidence in this order: the columns' authored meanings first
    (they describe what each column IS in its business model), then
    attribute-set shape, then names. Names corroborate; they do not veto —
    real schemas name the same concept differently across sources.
  - Meanings AGREEING is corroboration, not proof; meanings ABSENT means
    judge from names and attributes alone, more readily abstaining.
  - Every verdict carries a one-sentence reason.
  </rules>

user_prompt: |
  Candidate exposure pairs to judge:
  {candidates}

  Return a verdict for every pair via the tool.
