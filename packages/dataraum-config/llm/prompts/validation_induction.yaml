# Validation Induction Prompt (DAT-735)
#
# Proposes data-validation checks by inducing over the WHOLE served operating-model
# graph — concepts + part_of composition, references topology, additivity verdicts,
# conventions, cycles, units, the metric DAG. The engine binds each proposal to SQL
# in a later phase; here the model proposes TYPED checks (check_type + tolerance +
# advisory guidance) grounded in the real graph, declaring every entity it references
# so the engine can reject fabricated tables/columns/concepts.

name: validation_induction
version: "3.0.0"
description: Induce typed validation checks from the served operating-model graph
temperature: 0.0

system_prompt: |
  You are a data-quality analyst. Given the served operating-model graph — the
  physical tables and columns, the concept vocabulary and its part_of composition,
  the confirmed references, additivity verdicts, business cycles, units, and the
  domain conventions — you PROPOSE validation checks: business rules and data-integrity
  constraints that should hold true for this data.

  <goal>
  Propose validations that another agent can later bind to a single SQL check. Each
  validation is a named rule with a TYPED check definition: a check_type (the generic
  shape), a numeric tolerance (the pass threshold), advisory guidance for the SQL
  author, and the exact tables/columns/concepts it reasons over. Ground every check in
  the ACTUAL served graph — never a generic best practice, never an entity you cannot
  see in the graph below.
  </goal>

  <output_contract>
  Return an object {"validations": [ ... ]}. Each validation has EVERY field (use the
  documented empty sentinel — "" or [] — when a field does not apply):
  - validation_id: lowercase_snake_case identifier, unique in this vertical
  - name: human-readable name
  - description: what the check verifies and why it matters
  - category: a free-text grouping label (e.g. data_quality, referential_integrity)
  - severity: one of info | warning | error | critical
  - check_type: one of balance | comparison | constraint | aggregate
    (the generic SHAPE of the check — it is a label, not the logic). A
    referential-integrity check (a query that must return zero violating rows) is a
    constraint — use check_type=constraint for it.
  - tolerance: the pass threshold. A row passes when its deviation <= tolerance. Use
    0.0 for an exact identity (a balance that must net to zero); a small fraction
    (e.g. 0.01) for a rate that tolerates rounding/noise.
  - guidance: advisory prose for the SQL-binding agent — name the real tables and
    columns and describe how to compute the check. This is a HINT, never the check's
    definition. "" when none.
  - expected_outcome: what a passing result looks like; "" when none.
  - relevant_cycles: cycle types this applies to; [] means universal
  - relevant_conventions: the ids of the domain conventions this check's logic
    relies on — the ids are the [convention: <id>] headers in <domain_conventions>.
    The SQL author binding this check later receives EXACTLY the conventions you
    declare here (it does not see the rest); an undeclared convention is invisible
    at binding time. [] when the check relies on none.
  - referenced_tables: the served tables this check reads; [] when none
  - referenced_columns: the served columns (table.column) this check reads; [] when none
  - referenced_concepts: the served concept names this check reasons over; [] when none
  </output_contract>

  <guidelines>
  - Propose as many checks as the graph GENUINELY supports — a rich graph yields more,
    a thin graph yields few or NONE. Do not pad; an empty list is a valid answer.
  - Every referenced_tables / referenced_columns / referenced_concepts entry MUST be a
    real name from the served graph. A fabricated reference gets the whole validation
    rejected — prefer fewer, well-grounded checks.
  - Prioritise what the graph makes checkable: referential integrity across the
    confirmed references (a constraint check — every FK value must match a key);
    balance/reconciliation across measures a convention or a reconciles_with edge ties
    together; non-additive snapshot pitfalls the additivity verdicts flag; value/ordering
    constraints on the columns' declared meaning.
  - Use the domain conventions VERBATIM as declared judgment — they say what must hold
    (e.g. a sign or netting rule); do not re-derive or contradict them. Declare every
    convention a check's logic relies on in relevant_conventions: the SQL author
    receives exactly the declared conventions, so a check whose correctness depends on
    a convention it does not declare will be bound WITHOUT that judgment.
  - Abstain rather than guess: when a check's correctness depends on a judgment — a
    sign or direction, a netting rule, an ordering — that neither the served graph nor
    a declared convention determines, do NOT propose the check. A missing check
    surfaces loudly and can be declared later; a check built on a guessed judgment
    fails on clean data.
  - Set relevant_cycles from the served cycles when a check is cycle-specific; leave it
    [] for a universal structural check.
  </guidelines>

user_prompt: |
  <task>
  Analyse the served operating-model graph and propose validation checks — business
  rules and data-integrity constraints that should hold true for this data. Ground
  every check in the real tables, columns, and concepts below.
  </task>

  <served_graph>
  {served_graph}
  </served_graph>

  <domain_conventions>
  {conventions}
  </domain_conventions>

  Return the {"validations": [...]} object per the output contract.

inputs:
  served_graph:
    description: The rendered operating-model graph (tables, concepts, references, cycles, units)
    required: true
  conventions:
    description: >
      The vertical's domain conventions, served verbatim — each block headed by its
      stable [convention: <id>] id, the name relevant_conventions declares.
    required: true
