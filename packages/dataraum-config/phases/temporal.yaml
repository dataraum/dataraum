# Temporal Analysis Configuration
#
# Thresholds and parameters for temporal pattern analysis.
# These are algorithm tuning parameters — calibrate with test data.

version: "1.0.0"

# Granularity inference
# Maps median gap (seconds) to granularity name.
# Each entry: [name, expected_seconds, tolerance_seconds]
granularity:
  definitions:
    - [second, 1, 0.5]
    - [minute, 60, 5]
    - [hour, 3600, 300]
    - [day, 86400, 3600]
    - [week, 604800, 86400]
    - [month, 2592000, 259200]     # ~30 days
    - [quarter, 7776000, 777600]   # ~90 days
    - [year, 31536000, 3153600]    # ~365 days
  # Confidence when min/max gap stats are unavailable
  default_confidence: 0.7
  # Confidence for irregular patterns
  irregular_confidence: 0.3
  # Variation divisor for confidence calculation: confidence = 1 - min(variation / divisor, 0.5)
  variation_divisor: 10

# Gap detection
gaps:
  # Multiplier on median gap to define "significant gap"
  significant_gap_multiplier: 2.0
  # Severity thresholds (multipliers on median gap)
  severity_severe_multiplier: 10.0
  severity_moderate_multiplier: 5.0

# Update frequency and staleness
staleness:
  # Multiplier on median interval to define "stale"
  stale_multiplier: 2.0

# Fiscal calendar detection
fiscal_calendar:
  # Minimum data points (~3 months)
  min_data_points: 90
  # Fiscal year end: month count must exceed mean * multiplier
  activity_spike_multiplier: 1.5
  # Period-end effects: actual ratio must exceed expected * multiplier
  period_end_spike_multiplier: 1.5
  # Expected ratio of end-of-month days (days 28-31 / 30 days)
  expected_end_of_month_ratio: 0.13

# Quality issue thresholds
quality_issues:
  # Completeness thresholds
  low_completeness: 0.8        # Below this → issue
  very_low_completeness: 0.5   # Below this → severity "high"
  # Gap thresholds (days)
  large_gap_days: 30           # Above this → issue
  severe_gap_days: 90          # Above this → severity "high"

# Sampling and parallelism
processing:
  # Maximum parallel workers for column profiling. CPU-bound — under
  # PYTHON_GIL=0 (3.14t) threads parallelize; under GIL they serialize
  # but the cap is harmless.
  max_workers: 8
  # Time series sampling (Bernoulli)
  sample_percent: 20.0
  min_sample_rows: 1000
