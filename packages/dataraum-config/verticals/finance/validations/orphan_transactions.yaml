# Orphan Transaction Validation
# Checks for transactions without matching dimension records

validation_id: orphan_transactions
name: Orphan Transactions
description: >
  Validates referential integrity between fact (transaction) tables and
  their dimension tables. Orphan transactions — rows in a fact table
  whose foreign key has no matching record in the dimension table —
  indicate broken data pipelines, missing master data loads, or
  premature deletion of dimension records. High orphan rates undermine
  cycle detection because entity flows cannot be traced end-to-end.

category: financial
severity: warning
version: "1.0"

tags:
  - cycle
  - referential-integrity
  - entity-flow
  - data-quality

relevant_cycles: []

check_type: aggregate

# The judged pass threshold per relationship leg (the ADR-0017 judgement
# reads `tolerance`; the former `max_orphan_rate` name was never read by the
# judge, which silently fell back to the 0.01 default).
tolerance: 0.02

guidance: >
  Use the confirmed relationships provided in the schema context to identify
  the foreign-key legs to check: ONLY entries whose type is 'foreign_key'. A
  'conformed_dimension' entry is two fact tables meeting at a shared dimension
  axis — its value mismatches are not orphans and it must never be counted
  here. 'hierarchy' entries (parent links within one entity) are out of scope
  for this check.

  Only check legs where both tables are available. Exclude NULL foreign keys
  (those are missing data, not orphans).

  Per the output contract, return ONE ROW PER LEG:
  - leg (VARCHAR): 'fact_table.fk_column->dim_table.key_column'
  - deviation (DOUBLE): that leg's orphan rate — rows whose FK value has no
    match in the dimension key column, divided by the leg's non-NULL FK rows
  - magnitude (DOUBLE): 1.0

  Never pool legs into one number: SUM(orphans) / SUM(rows) across
  heterogeneous relationships dilutes a broken leg below tolerance and hides
  which relationship failed.

expected_outcome: >
  Every leg's orphan rate stays at or below the tolerance (2%). Zero orphans
  is ideal. Any orphans should be investigated for missing dimension loads or
  stale references.
