# DataRaum platform stack — Postgres + control-plane (Python engine) + cockpit (TanStack Start).
#
# Run from workspace root:
#   docker compose -f packages/infra/docker-compose.yml --env-file packages/infra/.env up -d --wait
# Or via the root Makefile:
#   make up
#
# First run:
#   cp packages/infra/.env.example packages/infra/.env
#   make up
#   curl http://127.0.0.1:8000/health   # → {"status":"ok",...}
#   open http://127.0.0.1:3000

services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DUCKLAKE_CATALOG_DB: ${DUCKLAKE_CATALOG_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../engine/docker/postgres-init/:/docker-entrypoint-initdb.d/:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

  control-plane:
    build:
      context: ../engine
      dockerfile: docker/control-plane.Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # DATABASE_URL is consumed by SQLAlchemy (workspace + sessions); the
      # +psycopg dialect prefix is required — we ship psycopg v3, not psycopg2,
      # and the bare postgresql:// scheme falls back to the missing psycopg2
      # driver. DUCKLAKE_CATALOG_URL is consumed by DuckDB's postgres
      # extension (libpq), which accepts the bare postgresql:// scheme.
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DUCKLAKE_CATALOG_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${DUCKLAKE_CATALOG_DB}
      DUCKLAKE_DATA_PATH: /var/lib/dataraum/lake
      DATARAUM_CONFIG_PATH: /opt/dataraum/config
      # DATARAUM_HOME is the writable workspace state root (DAT-358).
      # bootstrap_workspace fails loud if it's unset; the mounted volume
      # (dataraum_workspace) gives it restart persistence.
      DATARAUM_HOME: /var/lib/dataraum/workspace
      # DATARAUM_WORKSPACE_ID is the active workspace pointer (DAT-339 pivot).
      # Engine resolves the Postgres schema name as ws_<id-with-dashes-as-_>
      # and sets search_path on every connection. bootstrap_workspace fails
      # loud if it's unset. Cockpit dev uses the same value to drive
      # drizzle-kit pull + the metadata client.
      DATARAUM_WORKSPACE_ID: ${DATARAUM_WORKSPACE_ID:-00000000-0000-0000-0000-000000000001}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - dataraum_lake:/var/lib/dataraum/lake
      - dataraum_workspace:/var/lib/dataraum/workspace
      - ${HOST_SOURCES_DIR:-../engine/sources}:/var/lib/dataraum/sources:ro
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  cockpit:
    # Runtime env to wire when the cockpit starts hitting Postgres (Phase 1+
    # of the DAT-339 pivot):
    #   COCKPIT_DATABASE_URL  — cockpit_db database in the shared Postgres
    #   METADATA_DATABASE_URL — engine metadata DB (same URL the engine uses,
    #                           sans the +psycopg dialect prefix)
    #   DATARAUM_WORKSPACE_ID — propagated from the control-plane block above
    # The cockpit's db/{cockpit,metadata}/client.ts files throw on import if
    # these are unset, so they must land before the first DB-touching route.
    build:
      context: ../cockpit
      args:
        VITE_ENGINE_API_URL: http://localhost:8000
    depends_on:
      control-plane:
        condition: service_healthy
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "--spider", "http://localhost:3000/"]
      interval: 10s
      timeout: 5s
      retries: 6

volumes:
  postgres_data:
  dataraum_lake:
  # Workspace state — the writable config overlay populated by
  # bootstrap_workspace (DAT-358). Edits land here and survive
  # container restart / rebuild.
  dataraum_workspace:
