# DAT-807 verification overlay — build BOTH app images from THIS worktree.
#
# compose `build.context: ../engine` resolves relative to the compose FILE's
# directory, which lives in the MAIN checkout — a plain build silently ships
# main, not the branch. Absolute paths here pin both services to the worktree.
#
# The config tree is DATA, bind-mounted from ${HOST_CONFIG_DIR:-../dataraum-config}
# (main again), so ALSO export HOST_CONFIG_DIR on every compose invocation:
#   export HOST_CONFIG_DIR=/Users/philipp/Code/dataraum/dataraum-context/.claude/worktrees/epic-dat-807/packages/dataraum-config
# Verify inside the container before trusting a run:
#   docker exec <engine-worker> grep -A3 'business_cycles' /opt/dataraum/config/llm/config.yaml
services:
  engine-worker:
    build:
      context: /Users/philipp/Code/dataraum/dataraum-context/.claude/worktrees/epic-dat-807/packages/engine
      dockerfile: docker/worker.Dockerfile
  cockpit:
    build:
      context: /Users/philipp/Code/dataraum/dataraum-context/.claude/worktrees/epic-dat-807/packages/cockpit
  # Runs drizzle-kit from the cockpit image's `build` stage — same context trap.
  cockpit-migrate:
    build:
      context: /Users/philipp/Code/dataraum/dataraum-context/.claude/worktrees/epic-dat-807/packages/cockpit
      target: build
