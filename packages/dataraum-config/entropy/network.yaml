# Entropy Network Configuration
#
# A weighted DAG of entropy sub-dimensions. Detector scores enter at observable
# nodes and are rolled up to intent readiness via noisy-OR using the edge
# strengths below (see entropy/network/rollup.py). No priors, no CPDs — a node
# with no observed parents simply doesn't contribute.
states: [low, medium, high]

discretization:
  low_upper: 0.3
  medium_upper: 0.6
  # high: > 0.6

nodes:
  # Observable roots (8) - each has a detector
  type_fidelity:
    layer: structural
    dimension: types
    sub_dimension: type_fidelity
  null_ratio:
    layer: value
    dimension: nulls
    sub_dimension: null_ratio
  outlier_rate:
    layer: value
    dimension: outliers
    sub_dimension: outlier_rate
  naming_clarity:
    layer: semantic
    dimension: business_meaning
    sub_dimension: naming_clarity
  unit_declaration:
    layer: semantic
    dimension: units
    sub_dimension: unit_declaration
  time_role:
    layer: semantic
    dimension: temporal
    sub_dimension: time_role
  temporal_drift:
    layer: value
    dimension: temporal
    sub_dimension: temporal_drift
  benford_compliance:
    layer: value
    dimension: distribution
    sub_dimension: benford_compliance

  slice_stability:
    layer: value
    dimension: variance
    sub_dimension: slice_stability

  dimension_coverage:
    layer: semantic
    dimension: coverage
    sub_dimension: dimension_coverage

  # Zone 3 observable roots (2) — table-scoped detectors, broadcast to columns
  cross_table_consistency:
    layer: computational
    dimension: reconciliation
    sub_dimension: cross_table_consistency
  business_cycle_health:
    layer: semantic
    dimension: cycles
    sub_dimension: business_cycle_health

  # Observable children (2) - have detectors but also real causal parents
  join_path_determinism:
    layer: structural
    dimension: relations
    sub_dimension: join_path_determinism
  relationship_quality:
    layer: structural
    dimension: relations
    sub_dimension: relationship_quality

  # Inferred children (2) - genuine causal composites
  formula_match:
    layer: computational
    dimension: derived_values
    sub_dimension: formula_match
  aggregation_safety:
    layer: computational
    dimension: derived_values
    sub_dimension: aggregation_safety

  # Intent leaves (3) - readiness scores
  query_intent:
    layer: intent
    dimension: query
    sub_dimension: readiness
  aggregation_intent:
    layer: intent
    dimension: aggregation
    sub_dimension: readiness
  reporting_intent:
    layer: intent
    dimension: reporting
    sub_dimension: readiness

edges:
  # Format: [parent, child, strength]
  # Structural -> children
  - [type_fidelity, join_path_determinism, 0.5]
  - [type_fidelity, relationship_quality, 0.6]
  # Root -> computational children
  - [naming_clarity, formula_match, 0.5]
  - [unit_declaration, formula_match, 0.8]
  - [null_ratio, formula_match, 0.4]
  - [null_ratio, aggregation_safety, 0.7]
  - [outlier_rate, aggregation_safety, 0.6]
  - [unit_declaration, aggregation_safety, 0.9]
  # dimension_coverage -> intent leaves
  - [dimension_coverage, query_intent, 0.5]
  - [dimension_coverage, reporting_intent, 0.6]
  # slice_stability -> intents
  - [slice_stability, query_intent, 0.4]
  - [slice_stability, aggregation_intent, 0.5]
  # -> query_intent (7 parents)
  - [type_fidelity, query_intent, 0.7]
  - [join_path_determinism, query_intent, 0.8]
  - [null_ratio, query_intent, 0.5]
  - [outlier_rate, query_intent, 0.4]
  - [naming_clarity, query_intent, 0.3]
  - [temporal_drift, query_intent, 0.3]
  # A broken time role (unparseable dates) makes time-filtering/ordering
  # unreliable — more severe than drift, hence the higher strength.
  - [time_role, query_intent, 0.5]
  # -> aggregation_intent (5 parents)
  - [aggregation_safety, aggregation_intent, 0.9]
  - [formula_match, aggregation_intent, 0.7]
  - [temporal_drift, aggregation_intent, 0.5]
  - [benford_compliance, aggregation_intent, 0.4]
  # Time-bucketed aggregations (monthly revenue, …) break on a bad time role.
  - [time_role, aggregation_intent, 0.4]
  # -> reporting_intent (6+1 parents)
  - [naming_clarity, reporting_intent, 0.7]
  - [relationship_quality, reporting_intent, 0.5]
  - [aggregation_safety, reporting_intent, 0.8]
  - [unit_declaration, reporting_intent, 0.6]
  - [time_role, reporting_intent, 0.4]
  - [type_fidelity, reporting_intent, 0.4]
  - [cross_table_consistency, reporting_intent, 0.7]
  # Zone 3 -> intents
  - [cross_table_consistency, aggregation_intent, 0.8]
  - [business_cycle_health, reporting_intent, 0.5]
  - [business_cycle_health, aggregation_intent, 0.4]
