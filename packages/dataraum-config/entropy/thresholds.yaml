# Entropy Detection Thresholds Configuration
#
# This file contains all configurable thresholds for the entropy detection system.
# Values were previously hardcoded across multiple files. Centralizing them here
# enables tuning without code changes.
#
# See BACKLOG.md Step 2.5.1 for context on this configuration.

# ============================================================================
# DETECTOR CONFIGURATIONS
# ============================================================================
# Each detector has its own section with formula parameters and thresholds.

detectors:
  # --------------------------------------------------------------------------
  # TYPE FIDELITY DETECTOR (structural.types.type_fidelity)
  # --------------------------------------------------------------------------
  # Formula: entropy = 1.0 - parse_success_rate
  # Special case: VARCHAR fallback (inference inconclusive) uses score_fallback
  type_fidelity:
    score_fallback: 0.5  # Score when type inference falls back to VARCHAR

  # --------------------------------------------------------------------------
  # NULL RATIO DETECTOR (value.nulls.null_ratio)
  # --------------------------------------------------------------------------
  # Score equals null_ratio directly (already 0.0–1.0)
  null_ratio:
    # Impact classification thresholds
    impact_minimal: 0.05 # < 5% nulls = minimal impact
    impact_moderate: 0.20 # < 20% nulls = moderate impact
    impact_significant: 0.50 # < 50% nulls = significant impact
    # >= 50% = critical impact

  # --------------------------------------------------------------------------
  # OUTLIER RATE DETECTOR — CUT (DAT-442)
  # --------------------------------------------------------------------------
  # Absolute single-column IQR/z-score has no setting that separates an injected
  # outlier burst from clean financial heavy tails: log-IQR absorbs the burst,
  # linear IQR flags 25%+ of legitimate long-tail values. Same wall as
  # temporal_drift / slice_variance. Detector + these thresholds removed; the
  # profiler's outlier statistics stay. See dataraum-eval test_outlier_rate_recorded.py.

  # --------------------------------------------------------------------------
  # JOIN PATH DETERMINISM DETECTOR (structural.relations.join_path_determinism)
  # --------------------------------------------------------------------------
  # Measures only on genuine multi-path ambiguity (DAT-851/853): with <=1 distinct
  # column-pair path between the two tables the question is unanswerable and the
  # detector ABSTAINS (no score at all - never a confident low one).
  join_path:
    score_deterministic: 0.1 # >1 paths, resolved by a preferred-join teach
    score_ambiguous: 0.7 # >1 distinct paths between the same two tables, unresolved

  # --------------------------------------------------------------------------
  # RELATIONSHIP ENTROPY DETECTOR (structural.relations.relationship_quality)
  # --------------------------------------------------------------------------
  # Uses actual evaluation metrics from JoinCandidate
  relationship_entropy:
    score_unknown_ri: 0.5 # Unknown referential integrity
    score_unverified_cardinality: 0.4 # Cardinality not verified
    score_cardinality_mismatch:
      0.4 # Cardinality verified but doesn't match (was 0.7)
      # Reduced: mismatch with good RI means relationship works,
      # just terminology is wrong (common with multi-tenant data)
    score_unconfirmed: 0.2 # Known type but not human-confirmed (LLM + good RI is strong signal)
    score_unknown_type: 0.6 # Unknown relationship type
    # Component weights for weighted average (replaces MAX aggregation)
    component_weights:
      referential_integrity: 0.5
      cardinality: 0.3
      semantic_clarity: 0.2

  # --------------------------------------------------------------------------
  # DERIVED VALUE DETECTOR (computational.derived_values.formula_match)
  # --------------------------------------------------------------------------
  # Formula: entropy = 1.0 - match_rate
  derived_value:
    # Match quality classification thresholds
    match_exact: 0.99 # >= 99% = exact match
    match_near_exact: 0.95 # >= 95% = near exact
    match_approximate: 0.80 # >= 80% = approximate
    # < 80% = poor match
    # Scalar-leg hygiene for the GRADED LLM hypothesis (review wave-1): below
    # either floor the hypothesis still pools (conflict axis) but cannot drive
    # obj.score - protects clean columns whose true derivation is richer than
    # two terms from low-confidence guesses graded on thin samples.
    hypothesis_min_rows: 20
    hypothesis_min_confidence: 0.5

  # --------------------------------------------------------------------------
  # BUSINESS MEANING DETECTOR (semantic.business_meaning.naming_clarity)
  # --------------------------------------------------------------------------
  # Score assigned by documentation presence, weighted by LLM confidence
  business_meaning:
    score_missing: 1.0 # No description = high entropy
    score_partial: 0.6 # Description only, no business_name/entity_type
    score_documented: 0.2 # Has description + business_name or entity_type
    score_fully_documented: 0.0 # Has description + business_name + entity_type
    # Confidence penalty (additive: confidence_weight * (1 - confidence))
    # LLM reports low confidence (0.2–0.4) on unreadable column names.
    # At 0.5, a confidence of 0.25 gives penalty = 0.375, crossing the 0.3 threshold.
    confidence_weight: 0.5

  # --------------------------------------------------------------------------
  # UNIT ENTROPY DETECTOR (semantic.units.unit_declaration)
  # --------------------------------------------------------------------------
  # Measures whether numeric columns (measures) have declared units
  unit_entropy:
    score_no_unit: 0.8 # Measure without unit declaration
    score_low_confidence: 0.5 # Unit detected but low confidence
    score_declared: 0.1 # Unit declared with high confidence
    confidence_threshold: 0.5 # Below this = low confidence

  # --------------------------------------------------------------------------
  # BENFORD DETECTOR (KL surprise → loss path, DAT-442)
  # --------------------------------------------------------------------------
  # Score = D_KL(observed leading digits ‖ Benford); see entropy/surprise.py. The
  # chi-square / Cramér's-V boost knobs are gone (KL is sample-size invariant, so
  # there is no n-inflation to undo). Only the small-sample guard remains.
  benford:
    min_sample_size: 100       # below this, leading-digit frequencies are too noisy

  # --------------------------------------------------------------------------
  # DIMENSIONAL ENTROPY DETECTOR (semantic.dimensional.cross_column_patterns)
  # --------------------------------------------------------------------------
  # Pattern weights for cross-column entropy calculation
  temporal_entropy:
    score_unmarked: 0.6 # Date type but not marked as timestamp
    score_mismatch: 0.8 # Marked as timestamp but not date type
    score_aligned: 0.1 # Properly identified temporal column

# ============================================================================
# DIMENSION DISPLAY LABELS
# ============================================================================
# Human-readable labels for dimension paths. Used in contract violations,
# dashboards, and reports. Falls back to title-casing the last segment.

dimension_labels:
  structural.types: "Type Consistency"
  structural.relations: "Relationship Clarity"
  semantic.business_meaning: "Business Documentation"
  semantic.units: "Unit Documentation"
  semantic.temporal: "Temporal Clarity"
  value.nulls: "Data Completeness"
  value.outliers: "Outlier Impact"
  value.distribution: "Distribution Conformance"
  computational.derived_values: "Computation Reliability"
