# Pipeline Configuration
#
# Per-phase metadata for the analysis pipeline. Per-phase config lives in
# config/phases/<name>.yaml. Execution order is owned by the Temporal worker
# (AddSourceWorkflow), not by this file. `detectors` lists the entropy
# detectors run as post-steps after each phase completes.

version: "2.0.0"

phases:
  # =========================================================================
  # Zone 1: Foundation
  # =========================================================================
  import:
    description: Load data files into raw tables

  typing:
    description: Type inference and resolution
    detectors: [type_fidelity, null_semantics]

  statistics:
    description: Statistical profiling of typed tables
    detectors: [null_ratio]

  column_eligibility:
    description: Column eligibility evaluation

  statistical_quality:
    description: "Benford's Law and outlier detection"

  relationships:
    description: Cross-table relationship detection

  temporal:
    description: Temporal pattern and trend analysis

  semantic_per_column:
    description: Per-column LLM annotation (roles, concepts, business terms)
    # temporal_behavior (DAT-445) is declared here — per column it pools the ontology
    # temporal_behavior prior these annotations carry against the LLM's independent
    # stock/flow claim. It runs at the terminal source-wide detect, after every
    # column's annotation is written, so load_semantic resolves both witnesses; the
    # resolved layer then writes the adjudicated behaviour + contested flag back.
    detectors: [business_meaning, unit_entropy, temporal_entropy, benford, temporal_behavior]

  semantic_per_table:
    description: Per-table LLM synthesis (entities, relationships) over annotations
    detectors: [join_path_determinism, relationship_entropy]

  # =========================================================================
  # Zone 2: Enrichment
  # =========================================================================
  enriched_views:
    description: Create enriched views joining fact + dimension tables
    detectors: [dimension_coverage]

  slicing:
    description: LLM-powered slice dimension identification

  slicing_view:
    description: Create slicing views narrowed to slice-relevant columns

  slice_analysis:
    description: Execute slice SQL and analyze slice tables
    # No detector: slice_variance was cut (DAT-442 reset). The phase still runs
    # to build the slice profiles dimensional_entropy reads in
    # temporal_slice_analysis.

  temporal_slice_analysis:
    description: Distribution drift analysis on slices
    detectors: [dimensional_entropy]  # temporal_drift cut (DAT-442 reset)

  correlations:
    description: Within-table correlation analysis
    detectors: [derived_value]

  # =========================================================================
  # Zone 3: Interpretation
  # =========================================================================
  business_cycles:
    description: Expert LLM cycle detection
    detectors: []  # business_cycle_health cut (DAT-442); the cycle analysis stays

  validation:
    description: LLM-powered validation checks
    detectors: [cross_table_consistency]

  metrics:
    description: Compute metric graphs through the lifecycle (declare → compose → execute)

# Limits
limits:
  max_columns: 500  # Overall across all tables in a pipeline run
