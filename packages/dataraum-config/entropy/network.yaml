# Entropy Network Configuration
#
# A weighted DAG of entropy sub-dimensions. Detector scores enter at observable
# nodes and are rolled up to intent readiness via noisy-OR using the edge
# strengths below (see entropy/network/rollup.py). No priors, no CPDs — a node
# with no observed parents simply doesn't contribute.
states: [low, medium, high]

discretization:
  low_upper: 0.3
  medium_upper: 0.6
  # high: > 0.6

nodes:
  # Observable roots - each has a detector
  type_fidelity:
    layer: structural
    dimension: types
    sub_dimension: type_fidelity

  # null_ratio + outlier_rate: moved off the network onto the loss path (DAT-442)
  # — plain rates, their {score} feeds risk(intent) via entropy/loss.yaml.

  naming_clarity:
    layer: semantic
    dimension: business_meaning
    sub_dimension: naming_clarity
  unit_declaration:
    layer: semantic
    dimension: units
    sub_dimension: unit_declaration
  time_role:
    layer: semantic
    dimension: temporal
    sub_dimension: time_role

  # benford + temporal_drift: moved off the network onto the loss path (DAT-442)
  # — their surprise scores feed risk(intent) via entropy/loss.yaml, not a node +
  # hand-set edge.

  # slice_variance (slice_stability): moved off the network onto the loss path
  # (DAT-442) — its cross-slice spread feeds risk(intent) via entropy/loss.yaml.

  dimension_coverage:
    layer: semantic
    dimension: coverage
    sub_dimension: dimension_coverage

  # Value-layer cross-column patterns (DAT-403) — table-scoped dimensional_entropy
  # (mutual exclusivity / conditional dependency / correlated variance across the
  # slices). Columns that are not independent raise query + aggregation risk.
  cross_column_patterns:
    layer: semantic
    dimension: dimensional
    sub_dimension: cross_column_patterns

  # Zone 3 observable roots (2) — table-scoped detectors, broadcast to columns
  cross_table_consistency:
    layer: computational
    dimension: reconciliation
    sub_dimension: cross_table_consistency
  business_cycle_health:
    layer: semantic
    dimension: cycles
    sub_dimension: business_cycle_health

  # Observable children (2) - have detectors but also real causal parents
  join_path_determinism:
    layer: structural
    dimension: relations
    sub_dimension: join_path_determinism
  relationship_quality:
    layer: structural
    dimension: relations
    sub_dimension: relationship_quality

  # formula_match (derived_value) + aggregation_safety: dissolved (DAT-442 flat-table
  # end-state). aggregation_safety had no detector — the aggregation_intent BAND
  # expresses "is it safe to aggregate" directly. derived_value's formula-match score
  # feeds the loss path; aggregation_safety's only non-migrated parent
  # (unit_declaration) is rewired straight to the intents below.

  # Intent leaves (3) - readiness scores
  query_intent:
    layer: intent
    dimension: query
    sub_dimension: readiness
  aggregation_intent:
    layer: intent
    dimension: aggregation
    sub_dimension: readiness
  reporting_intent:
    layer: intent
    dimension: reporting
    sub_dimension: readiness

edges:
  # Format: [parent, child, strength]
  # Structural -> children
  - [type_fidelity, join_path_determinism, 0.5]
  - [type_fidelity, relationship_quality, 0.6]
  # null_ratio / outlier_rate / derived_value (formula_match) → loss path;
  # aggregation_safety dissolved (DAT-442). The computational composites are gone.
  # dimension_coverage -> intent leaves
  - [dimension_coverage, query_intent, 0.5]
  - [dimension_coverage, reporting_intent, 0.6]
  # cross_column_patterns -> intents (DAT-403; initial strengths, eval-calibrated)
  - [cross_column_patterns, query_intent, 0.3]
  - [cross_column_patterns, aggregation_intent, 0.4]
  # -> query_intent
  - [type_fidelity, query_intent, 0.7]
  - [join_path_determinism, query_intent, 0.8]
  - [naming_clarity, query_intent, 0.3]
  # A broken time role (unparseable dates) makes time-filtering/ordering
  # unreliable — more severe than drift, hence the higher strength.
  - [time_role, query_intent, 0.5]
  # -> aggregation_intent. unit_declaration rewired direct here (was unit →
  # aggregation_safety → aggregation_intent before the composite dissolved).
  - [unit_declaration, aggregation_intent, 0.8]
  # Time-bucketed aggregations (monthly revenue, …) break on a bad time role.
  - [time_role, aggregation_intent, 0.4]
  # -> reporting_intent
  - [naming_clarity, reporting_intent, 0.7]
  # 0.5 → 0.75 (DAT-405 calibration): at relationship grain the ONLY observed
  # parent is relationship_quality itself, so the edge alone must carry a real
  # RI problem past the 0.3 band. The sqrt-boosted 20%-orphan fixture scores
  # ≈0.45 → 0.75 puts it at "investigate" with margin; clean relationships
  # score ≈0.1 (below the clean-band floor) and are unaffected.
  - [relationship_quality, reporting_intent, 0.75]
  - [unit_declaration, reporting_intent, 0.6]
  - [time_role, reporting_intent, 0.4]
  - [type_fidelity, reporting_intent, 0.4]
  - [cross_table_consistency, reporting_intent, 0.7]
  # Zone 3 -> intents
  - [cross_table_consistency, aggregation_intent, 0.8]
  - [business_cycle_health, reporting_intent, 0.5]
  - [business_cycle_health, aggregation_intent, 0.4]
