name: compose-smoke

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    compose-smoke:
        runs-on: ubuntu-latest
        timeout-minutes: 15
        defaults:
            run:
                working-directory: packages/infra
        steps:
            - uses: actions/checkout@v7

            - name: Seed .env from .env.example
              run: cp .env.example .env

            - name: Build and start the stack
              run: docker compose up -d --wait

            - name: Wait for the engine worker heartbeat (Status=Running)
              run: |
                  set -euo pipefail
                  # The engine is a Temporal activity worker, not an HTTP service
                  # (DAT-344) — its health is the worker heartbeat the Temporal
                  # server records. Poll it via the `temporal` CLI in the
                  # admin-tools image (the server/engine images ship no CLI).
                  # Status=Running also implies the worker finished bootstrapping
                  # its substrate (and the ws_<id> schema) before it began
                  # polling, which the drizzle drift check below relies on.
                  # The queue is per-workspace now (DAT-505): engine-<workspace_id>,
                  # derived from the same DATARAUM_WORKSPACE_ID the compose stack uses.
                  # shellcheck disable=SC1091
                  . ./.env
                  queue="engine-${DATARAUM_WORKSPACE_ID}"
                  for i in $(seq 1 30); do
                      line=$(docker compose run --rm --no-deps --entrypoint temporal temporal-admin-tools \
                          worker list --namespace default --address temporal:7233 2>/dev/null \
                          | grep "$queue" || true)
                      if echo "$line" | grep -qi "running"; then
                          echo "engine worker is Running:"
                          echo "$line"
                          exit 0
                      fi
                      echo "worker not Running yet ($i/30)…"
                      sleep 5
                  done
                  echo "::error::engine worker did not reach Status=Running on $queue"
                  exit 1

            - name: Verify all three Postgres databases exist
              run: |
                  set -euo pipefail
                  # shellcheck disable=SC1091
                  . ./.env
                  dbs=$(docker compose exec -T postgres \
                      psql -U "$POSTGRES_USER" -d "$POSTGRES_DB" -tAc \
                      "SELECT datname FROM pg_database WHERE datname IN ('$POSTGRES_DB','$DUCKLAKE_CATALOG_DB','$COCKPIT_DB') ORDER BY datname")
                  echo "Found databases:"
                  echo "$dbs"
                  echo "$dbs" | grep -qx "$POSTGRES_DB"
                  echo "$dbs" | grep -qx "$DUCKLAKE_CATALOG_DB"
                  echo "$dbs" | grep -qx "$COCKPIT_DB"

            - name: Verify the lake bucket exists in the object store
              run: |
                  set -euo pipefail
                  # The lake is on S3 now (DAT-388) — no shared filesystem. The
                  # engine ATTACHing the s3:// lake at bootstrap is already proven
                  # by the Status=Running gate above: bootstrap_lake loads httpfs,
                  # registers the S3 secret, and ATTACHes the s3:// DATA_PATH, all
                  # fail-loud, so a broken endpoint/secret/bucket means the worker
                  # never reports Running. Here we additionally assert seaweedfs-init
                  # created the bucket both sides point their lake path at.
                  # shellcheck disable=SC1091
                  . ./.env
                  buckets=$(docker compose exec -T seaweedfs sh -c \
                      'echo "s3.bucket.list" | weed shell -master=localhost:9333 -filer=localhost:8888' 2>/dev/null)
                  echo "Buckets:"; echo "$buckets"
                  echo "$buckets" | grep -q "$S3_BUCKET"

            # (The drizzle metadata drift check moved to ci.yml `schema-drift` —
            # it no longer needs the live stack: schema.sql is dumped offline
            # from the SQLAlchemy models and pulled via a scratch Postgres.)

            # Cockpit integration suites (`*.integration.test.*`) against the live
            # stack — the one place they actually execute. They need a real Postgres
            # with the engine-created ws_<id> tables plus the bootstrapped DuckLake/S3,
            # none of which exist in the fast, stack-less `cockpit` PR gate (ci.yml),
            # so that gate runs unit-only and these suites self-skip there (no
            # METADATA_DATABASE_URL). The Status=Running gate above guarantees the
            # worker finished bootstrapping the ws_<id> schema before this runs.
            - name: Set up Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: "1.3.14"

            - name: Install cockpit deps
              working-directory: packages/cockpit
              run: bun install --frozen-lockfile

            # Run under the BUN runtime (`bun --bun`): the metadata client imports
            # `bun`'s SQL (vitest 5's bun-runtime support, vitest#10363) — plain
            # `bun run` launches vitest on Node and fails to resolve `bun`. Env is the
            # host-port view of the compose services (ports publish to the runner:
            # postgres 5432, seaweedfs S3 8333), mirroring packages/infra/.env.example;
            # METADATA/COCKPIT use the `dataraum` OWNER role (write access to ws_<id>),
            # NOT the read-only cockpit_reader the cockpit container runs as.
            - name: Cockpit integration tests
              working-directory: packages/cockpit
              env:
                  COCKPIT_DATABASE_URL: postgres://dataraum:dataraum@127.0.0.1:5432/cockpit_db
                  METADATA_DATABASE_URL: postgres://dataraum:dataraum@127.0.0.1:5432/dataraum
                  DATARAUM_WORKSPACE_ID: 00000000-0000-0000-0000-000000000001
                  DATARAUM_CONFIG_PATH: ../dataraum-config
                  # Per-workspace lake prefix (DAT-505): the engine-worker writes
                  # workspace 1's parquet under s3://<bucket>/<ws>/lake, and DuckLake
                  # resolves DATA_PATH eagerly against the catalog — so the cockpit's
                  # READ_ONLY ATTACH must point at the SAME per-workspace prefix, not
                  # the old shared s3://<bucket>/lake. Catalog DB stays the base name
                  # (workspace 1 uses ${DUCKLAKE_CATALOG_DB}; the _<n> suffix is for
                  # the multi-workspace profile only).
                  DATARAUM_LAKE_PATH: s3://dataraum-lake/00000000-0000-0000-0000-000000000001/lake
                  DUCKLAKE_CATALOG_URL: postgresql://dataraum:dataraum@127.0.0.1:5432/dataraum_lake_catalog
                  ANTHROPIC_API_KEY: sk-ant-placeholder-replace-me
                  S3_ENDPOINT: 127.0.0.1:8333
                  S3_REGION: us-east-1
                  S3_USE_SSL: "false"
                  S3_ACCESS_KEY_ID: dataraum
                  S3_SECRET_ACCESS_KEY: dataraum-s3-secret
                  S3_BUCKET: dataraum-lake
              run: bun --bun run test:integration

            - name: Dump compose logs on failure
              if: failure()
              run: docker compose logs --no-color
