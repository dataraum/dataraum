# Witness reliabilities for pooled (adjudication) measurements — ADR-0009, DAT-457/450.
#
# A pooled measurement adjudicates a claim by pooling several WITNESSES, each
# weighted by a reliability r ∈ [0, 1] (the log-linear pooling exponent — see
# entropy/pooling/pool.py). Per ADR-0009 these r are "estimated quantities with
# provenance, never inline constants": they are MEASURED by the eval reliability
# rig (dataraum-eval scripts/calibrate_reliabilities.py) — each witness run over
# the generative injection families against ground truth, r = its agreement
# accuracy (Beta-smoothed). This file is the shipped artifact that run produces;
# the engine loads it via entropy/reliabilities.py and the detector threads the
# values into the measurement.
#
# Reliability is the resolution weight only: conflict C is weight-robust (two
# disjoint one-hot witnesses give C=1 for any r), so a wrong/uncalibrated r never
# hides a disagreement — it only mis-resolves the posterior + ignorance U. That
# is why cold-start on placeholder priors is safe.
#
# `provenance` records WHERE these numbers came from. Until the rig has run,
# `calibrated: false` and the values are the DAT-457 placeholder priors (NOT
# tuned to pass any metric). After a rig run, eval overwrites both the values and
# this block with the measured corpus version, sample size, seed range, and date.

provenance:
  calibrated: true
  source: eval reliability rig (scripts/calibrate_reliabilities.py), DAT-450
  corpus_version: null_tokens-v2
  estimator: Laplace-smoothed accuracy on opinionated votes; abstentions excluded
  corpus_composition: 400 distinct-decoy + 100 clustered-decoy stress samples (~20%
    minority, disclosed not tuned)
  rows_per_sample: 2000
  sample_size_per_witness:
    quarantine_clustering: 2273
    type_claim: 2492
    null_vocabulary: 18161
  per_class_accuracy:
    quarantine_clustering:
      sensitivity: 1.0
      specificity: 0.0
    type_claim:
      sensitivity: 1.0
      specificity: 0.0
    null_vocabulary:
      sensitivity: 0.485
      specificity: 1.0
  pooled_brier_holdout: 0.1145
  pooled_brier_holdout_uniform: 0.1908
  pooled_brier_holdout_placeholder: 0.1895
  notes: "type_claim votes is-null on everything in failed_examples \u2192 it cannot\
    \ separate a sentinel from a genuine-but-unparseable value (specificity ~0) \u2192\
    \ low r, correctly down-weighted. quarantine_clustering votes is-null on any CLUSTER,\
    \ so on the clustered-decoy minority its specificity is < 1 (it mistakes a recurring\
    \ genuine value for a sentinel) \u2014 now measured, not hidden. Both are witness-design\
    \ findings for DAT-457, surfaced not tuned. Conflict C stays weight-robust, so\
    \ a contested genuine value still fires investigate via the vocabulary witness's\
    \ dissent."
  date: '2026-06-09'
witnesses:
  null_semantics:
    quarantine_clustering: 0.8681
    type_claim: 0.2658
    null_vocabulary: 0.944
