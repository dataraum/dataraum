# LLM Configuration
#
# Configure LLM providers for intelligent analysis features.
# When disabled, manual YAML configuration is required.

version: "1.0.0"

# Provider configurations
providers:
  anthropic:
    default_model: claude-sonnet-4-6
    models:
      fast: claude-haiku-4-5
      balanced: claude-sonnet-4-6

# Active provider
active_provider: anthropic

# Feature toggles
features:
  # DAT-362: per-column annotation is now the authoritative semantic_per_column
  # phase (Option B) — run it on the capable model, not the fast pre-pass tier.
  column_annotation:
    enabled: true
    model_tier: balanced

  semantic_analysis:
    enabled: true
    model_tier: balanced

  slicing_analysis:
    enabled: true
    model_tier: balanced

  validation:
    enabled: true
    model_tier: balanced

  # DAT-491: events→measure aggregation-lineage proposals (one batched call per
  # begin_session run; the deterministic reconciliation disposes the candidates).
  business_cycles:
    enabled: true
    model_tier: balanced

  enrichment_analysis:
    enabled: true
    model_tier: balanced
    prompt_file: prompts/enrichment_analysis.yaml
    description: >
      Identify valuable dimension joins to enrich main datasets
      with geographic, categorical, and reference data dimensions.
      Creates enriched views with no aggregations.

  why_analysis:
    enabled: true
    model_tier: balanced

  sql_repair:
    enabled: true
    model_tier: fast
    max_repair_attempts: 2

# Cost controls
limits:
  max_output_tokens_per_request: 16000

# Privacy settings for data sent to LLM
privacy:
  max_sample_values: 10
  sensitive_patterns:
    - ".*email.*"
    - ".*phone.*"
    - ".*ssn.*"
    - ".*social_security.*"
    - ".*credit_card.*"
    - ".*password.*"
    - ".*secret.*"
    - ".*token.*"
    - ".*api_key.*"
